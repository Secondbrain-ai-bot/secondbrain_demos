<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SAIL Port & Vessel Intelligence</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  html,body,#root{margin:0;padding:0;height:100%;background:#070d1a;overflow:hidden}
  *{box-sizing:border-box;margin:0;padding:0}
  ::-webkit-scrollbar{width:3px}
  ::-webkit-scrollbar-thumb{background:#1e293b}

  @keyframes pulse      {0%,100%{opacity:1}50%{opacity:0.4}}
  @keyframes fadeIn     {from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slideIn    {from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
  @keyframes logEntry   {0%{opacity:0;transform:translateX(-8px);background:#1d3a60} 60%{background:#0d2040} 100%{opacity:1;transform:translateX(0);background:transparent}}
  @keyframes impactPop  {0%{opacity:0;transform:scale(0.97)} 60%{transform:scale(1.01)} 100%{opacity:1;transform:scale(1)}}
  @keyframes actionSlide{from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)}}
  @keyframes ripple     {0%{transform:scale(0.8);opacity:1} 100%{transform:scale(2.2);opacity:0}}
  @keyframes checkIn    {from{transform:scale(0)} to{transform:scale(1)}}
  @keyframes shimmer    {0%{background-position:-200% 0} 100%{background-position:200% 0}}
  @keyframes borderBlue {0%,100%{border-color:rgba(59,130,246,0.35)} 50%{border-color:rgba(59,130,246,0.9)}}
  @keyframes borderAmber{0%,100%{border-color:rgba(245,158,11,0.35)} 50%{border-color:rgba(245,158,11,0.9)}}
  @keyframes borderRed  {0%,100%{border-color:rgba(239,68,68,0.35)} 50%{border-color:rgba(239,68,68,0.9)}}
  @keyframes glowBlue   {0%,100%{box-shadow:0 0 0 rgba(59,130,246,0)} 50%{box-shadow:0 0 22px rgba(59,130,246,0.14)}}
  @keyframes glowRed    {0%,100%{box-shadow:0 0 0 rgba(239,68,68,0)} 50%{box-shadow:0 0 22px rgba(239,68,68,0.14)}}

  .pulse-anim   { animation: pulse 1s infinite; }
  .fadein-anim  { animation: fadeIn 0.4s ease forwards; }
  .fadein6-anim { animation: fadeIn 0.6s ease forwards; }
  .slidein-anim { animation: slideIn 0.35s ease forwards; }
  .log-new      { animation: logEntry 0.55s ease forwards; }

  .hl-blue  { animation: borderBlue 1.4s ease-in-out infinite, glowBlue 1.4s ease-in-out infinite; }
  .hl-red   { animation: borderRed  1.4s ease-in-out infinite, glowRed  1.4s ease-in-out infinite; }

  .action-card { transition: all 0.18s ease; cursor:pointer; }
  .action-card:hover:not(.action-sel):not(.action-dim) { transform:translateX(3px); filter:brightness(1.12); }
  .action-sel  { filter:brightness(1.18); }
  .action-dim  { opacity:0.35; cursor:not-allowed; }
  .check-anim  { animation: checkIn 0.28s cubic-bezier(0.175,0.885,0.32,1.275) forwards; }
  .shimmer-btn { background:linear-gradient(90deg,#1d4ed8 0%,#0ea5e9 40%,#38bdf8 50%,#0ea5e9 60%,#1d4ed8 100%); background-size:200% 100%; animation:shimmer 2s infinite linear; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ─── STATIC DATA ─── */
/* Inventory = projected buffer on arrival (baseline, no disruption)
   Threshold  = minimum acceptable buffer (shutdown risk below this)
   Bhilai: 14d baseline arrival buffer, 5d minimum
   Other plants: comfortable range, same 5d threshold            */
const PLANTS = [
  {id:"bhilai",  short:"BSP",name:"Bhilai",  inventory:14,threshold:5},
  {id:"rourkela",short:"RSP",name:"Rourkela",inventory:18,threshold:5},
  {id:"bokaro",  short:"BSL",name:"Bokaro",  inventory:22,threshold:5},
  {id:"durgapur",short:"DSP",name:"Durgapur",inventory:26,threshold:5},
];
const PORTS = [
  {id:"paradip",   name:"Paradip",   vessels:14,baseline:6},
  {id:"vizag",     name:"Vizag",     vessels:9, baseline:6},
  {id:"gangavaram",name:"Gangavaram",vessels:11,baseline:6},
  {id:"haldia",    name:"Haldia",    vessels:7, baseline:6},
];
const POS = {
  haypoint:   {x:68, y:290},
  singapore:  {x:230,y:255},
  paradip:    {x:418,y:168},
  vizag:      {x:402,y:205},
  gangavaram: {x:400,y:218},
  haldia:     {x:432,y:144},
  bhilai:     {x:372,y:130},
  rourkela:   {x:395,y:122},
  bokaro:     {x:418,y:110},
  durgapur:   {x:435,y:102},
};
const ROUTE_NORMAL=[{x:68,y:290},{x:130,y:268},{x:200,y:248},{x:270,y:222},{x:340,y:195},{x:418,y:168}];
const ROUTE_DEV=[{x:68,y:290},{x:130,y:268},{x:200,y:248},{x:230,y:255}];
const VESSEL_POS=[{x:200,y:248},{x:230,y:255},{x:230,y:255}];

/* step 0=nominal, 1=signals flash, 2=impact highlight, 3=actions, 4=executed */
const ALL_LOGS = [
  {t:"06:14",m:"Vessel AIS updated — Day 5 transit on route",               c:"#64748b"},
  {t:"11:32",m:"Paradip anchorage: 14 vessels waiting — est. +4d port delay",c:"#f59e0b"},
  {t:"14:07",m:"Route deviation — MV GLORY SOVEREIGN heading to Singapore",  c:"#f59e0b"},
  {t:"14:09",m:"ETA recalculated: vessel delay +6d · port congestion +4d",   c:"#ef4444"},
  {t:"14:11",m:"Bhilai projected buffer on arrival: 4 days (min: 5 days)",   c:"#ef4444"},
  {t:"14:11",m:"ALERT — Buffer below minimum. Shutdown risk. Act now.",       c:"#ef4444"},
];

/* ACTIONS
   Baseline buffer on arrival:          14 days
   Disruption extra delay:              +10 days (6d vessel + 4d port congestion)
   Buffer without intervention:         14 - 10 = 4 days  → BELOW 5d minimum

   Priority rake saving:                2.5 days (rail 4d normal → 1.5d priority)
   Buffer with priority rake:           14 - 10 + 2.5 = 6.5 days → ABOVE 5d minimum

   Spot coal: emergency 20,000T sourced domestically — adds ~3d to runway
   BF reduction: 10% throughput cut — extends existing stock by ~1.5d
*/
const ACTIONS = [
  {id:"rake",label:"Priority rake allocation",
   icon:"🚂",badge:"RECOMMENDED",color:"#22c55e",riskLabel:"Risk: LOW",
   detail:"Emergency FOIS escalation. Rail leg cut from 4 days to 1.5 days — saving 2.5 days. Rakes pre-positioned at Paradip.",
   cost:"Est. Rs 0.4 Cr logistics premium",
   metrics:[["Buffer on arrival","6.5 days"],["Minimum required","5 days"],["BF throughput","100%"],["Cost impact","Rs 0.4 Cr"]],
   outcomeColor:"#22c55e",
   outcome:"Rail leg: 4d → 1.5d. Saving: 2.5 days. Buffer on arrival: 6.5 days — above 5 day minimum. Production protected."},
  {id:"spot",label:"Emergency spot procurement",
   icon:"⚓",badge:"CONTINGENCY",color:"#f59e0b",riskLabel:"Risk: MEDIUM",
   detail:"Emergency tender for 20,000T spot cargo — Indonesian or South African HCC. Arrives via alternate vessel in ~3 days.",
   cost:"Rs 1.6 Cr premium over contract price",
   metrics:[["Spot coal secured","20,000T"],["Buffer extended","~3 days"],["Combined buffer","~7 days"],["Premium cost","Rs 1.6 Cr"]],
   outcomeColor:"#f59e0b",
   outcome:"Spot cargo adds ~3 days to runway. Combined buffer ~7 days — above minimum. Higher cost but production secured."},
  {id:"bf",label:"Reduce BF throughput",
   icon:"🔥",badge:"LAST RESORT",color:"#ef4444",riskLabel:"Risk: HIGH",
   detail:"10% burden rate reduction across Blast Furnaces 1–3. Extends existing coal runway by ~1.5 days. Production loss immediate.",
   cost:"Rs 5–7 Cr hot metal production loss",
   metrics:[["Runway extended","~1.5 days"],["Output reduction","10%"],["Production loss","Rs 6 Cr"],["Buffer on arrival","~5.5 days"]],
   outcomeColor:"#ef4444",
   outcome:"Marginal buffer gain. 10% output loss locks in Rs 6 Cr production gap. Buys time only — root cause unresolved."},
];

/* ─── helpers ─── */
function ptStr(pts){return pts.map(function(p,i){return (i===0?"M":"L")+p.x+","+p.y;}).join(" ");}
function invColor(v,t){return v>t+5?"#22c55e":v>t?"#f59e0b":"#ef4444";}
function congColor(v,b){var r=v/b;return r<1.5?"#22c55e":r<2?"#f59e0b":"#ef4444";}

function useAnimNum(target){
  var ref=useRef(target);
  var s=useState(target); var val=s[0]; var setVal=s[1];
  useEffect(function(){
    var from=ref.current; var diff=target-from;
    if(!diff)return;
    var t0=performance.now(); var dur=700;
    function tick(now){
      var p=Math.min((now-t0)/dur,1);
      var e=p<0.5?2*p*p:-1+(4-2*p)*p;
      setVal(Math.round(from+diff*e));
      if(p<1)requestAnimationFrame(tick);else ref.current=target;
    }
    requestAnimationFrame(tick);
  },[target]);
  return val;
}

/* ─── PulseRing ─── */
function PulseRing({x,y,color}){
  return React.createElement(React.Fragment,null,
    React.createElement("circle",{cx:x,cy:y,r:16,fill:"none",stroke:color,strokeWidth:1,opacity:0.15,children:[
      React.createElement("animate",{key:"a1",attributeName:"r",values:"10;22;10",dur:"2s",repeatCount:"indefinite"}),
      React.createElement("animate",{key:"a2",attributeName:"opacity",values:"0.3;0;0.3",dur:"2s",repeatCount:"indefinite"}),
    ]}),
    React.createElement("circle",{cx:x,cy:y,r:10,fill:"none",stroke:color,strokeWidth:1,opacity:0.2,children:[
      React.createElement("animate",{key:"a3",attributeName:"r",values:"6;16;6",dur:"2s",begin:"0.5s",repeatCount:"indefinite"}),
      React.createElement("animate",{key:"a4",attributeName:"opacity",values:"0.4;0;0.4",dur:"2s",begin:"0.5s",repeatCount:"indefinite"}),
    ]})
  );
}

/* ─── MapNode ─── */
function MapNode({x,y,color,r=6,label="",dir="right",pulse=false}){
  var pad=r+6;
  var lx=dir==="right"?x+pad:dir==="left"?x-pad:x;
  var ly=dir==="top"?y-pad:dir==="bottom"?y+pad:y;
  var anchor=dir==="right"?"start":dir==="left"?"end":"middle";
  return (
    <g>
      {pulse&&<PulseRing x={x} y={y} color={color}/>}
      <circle cx={x} cy={y} r={r} fill={color} opacity={0.85}/>
      <circle cx={x} cy={y} r={r} fill="none" stroke={color} strokeWidth={1.5} opacity={0.35}/>
      {label&&<text x={lx} y={ly} fill="#94a3b8" fontSize={9.5} fontFamily="monospace" dominantBaseline="middle" textAnchor={anchor}>{label}</text>}
    </g>
  );
}

/* ─── Map ─── */
function SailMap({step}){
  var deviated=step>=1;
  var alerted=step>=2;
  var vp=VESSEL_POS[Math.min(deviated?1:0,2)];
  var vc=!deviated?"#22c55e":"#ef4444";
  var paradipV=deviated?16:14;
  var bhilaiInv=alerted?4:14;
  var etaDay=deviated?18:12;
  var etaDelay=deviated?6:0;
  var statusLabel=!deviated?"NOMINAL":"ALERT";
  var statusColor=!deviated?"#22c55e":"#ef4444";
  var railColor=alerted?"#ef4444":"#1e3a5f";
  var railW=alerted?1.8:0.8;
  return (
    <svg viewBox="0 0 600 400" style={{width:"100%",height:"100%",display:"block"}}>
      <defs>
        <radialGradient id="oceanBg" cx="35%" cy="65%" r="75%">
          <stop offset="0%" stopColor="#0c1e3a"/><stop offset="100%" stopColor="#060c18"/>
        </radialGradient>
        <pattern id="gridPat" width="30" height="30" patternUnits="userSpaceOnUse">
          <path d="M30,0 L0,0 0,30" fill="none" stroke="#0d2040" strokeWidth="0.4"/>
        </pattern>
      </defs>
      <rect width="600" height="400" fill="url(#oceanBg)"/>
      <rect width="600" height="400" fill="url(#gridPat)" opacity="0.6"/>
      <text x="68"  y="335" fill="#152840" fontSize="10" fontFamily="monospace" textAnchor="middle" letterSpacing="2.5">AUSTRALIA</text>
      <text x="270" y="340" fill="#152840" fontSize="10" fontFamily="monospace" textAnchor="middle" letterSpacing="2.5">INDIAN OCEAN</text>
      <text x="460" y="68"  fill="#152840" fontSize="10" fontFamily="monospace" textAnchor="middle" letterSpacing="2.5">INDIA</text>
      {[100,160,220,280,340].map(function(y){return <line key={y} x1="0" y1={y} x2="600" y2={y} stroke="#0d2040" strokeWidth="0.5" strokeDasharray="5 10"/>;} )}
      <path d={ptStr(ROUTE_NORMAL)} fill="none" stroke="#22c55e" strokeWidth="1.2" strokeDasharray="7 6" opacity={deviated?0.18:0.45}/>
      {!deviated&&<path d={ptStr(ROUTE_NORMAL.slice(0,3))} fill="none" stroke="#22c55e" strokeWidth="2.2" opacity="0.85"/>}
      {deviated&&<path d={ptStr(ROUTE_DEV)} fill="none" stroke="#ef4444" strokeWidth="2.2" strokeDasharray="6 4" opacity="0.9"/>}
      <line x1={POS.paradip.x} y1={POS.paradip.y} x2={POS.bhilai.x} y2={POS.bhilai.y} stroke={railColor} strokeWidth={railW} strokeDasharray="3 4" opacity={alerted?0.75:0.4}/>
      {alerted&&<text x={(POS.paradip.x+POS.bhilai.x)/2+10} y={(POS.paradip.y+POS.bhilai.y)/2} fill="#ef4444" fontSize="8" fontFamily="monospace" opacity="0.65">RAIL LINK</text>}
      <MapNode x={POS.haypoint.x} y={POS.haypoint.y} color="#64748b" r={5} label="Hay Point, QLD" dir="right"/>
      {deviated&&<g><MapNode x={POS.singapore.x} y={POS.singapore.y} color="#f59e0b" r={6} label="Singapore" dir="top" pulse={true}/><text x={POS.singapore.x} y={POS.singapore.y+20} fill="#f59e0b" fontSize="8.5" fontFamily="monospace" textAnchor="middle" opacity="0.85">anchorage detected</text></g>}
      <MapNode x={POS.paradip.x}    y={POS.paradip.y}    color={congColor(paradipV,6)} r={7} label="Paradip"    dir="right" pulse={deviated}/>
      <MapNode x={POS.vizag.x}      y={POS.vizag.y}      color={congColor(9,6)}        r={5} label="Vizag"      dir="left"/>
      <MapNode x={POS.gangavaram.x} y={POS.gangavaram.y} color={congColor(11,6)}       r={5} label="Gangavaram" dir="left"/>
      <MapNode x={POS.haldia.x}     y={POS.haldia.y}     color={congColor(7,6)}        r={5} label="Haldia"     dir="right"/>
      <MapNode x={POS.bhilai.x}   y={POS.bhilai.y}   color={invColor(bhilaiInv,5)}  r={8} label="BSP Bhilai"   dir="left" pulse={alerted}/>
      <MapNode x={POS.rourkela.x} y={POS.rourkela.y} color={invColor(18,5)}         r={5} label="RSP Rourkela" dir="right"/>
      <MapNode x={POS.bokaro.x}   y={POS.bokaro.y}   color={invColor(22,5)}         r={5} label="BSL Bokaro"   dir="right"/>
      <MapNode x={POS.durgapur.x} y={POS.durgapur.y} color={invColor(26,5)}         r={5} label="DSP Durgapur" dir="right"/>
      <polygon points={vp.x+","+(vp.y-9)+" "+(vp.x+7)+","+(vp.y+6)+" "+(vp.x-7)+","+(vp.y+6)} fill={vc} opacity="0.95"/>
      <text x={vp.x} y={vp.y+20} fill={vc} fontSize="8.5" fontFamily="monospace" textAnchor="middle" fontWeight="500">MV GLORY SOVEREIGN</text>
      <text x={vp.x} y={vp.y+31} fill={deviated?"#f59e0b":"#64748b"} fontSize="8" fontFamily="monospace" textAnchor="middle">{!deviated?"Day 5 · on route":"route deviation"}</text>
      <rect x="12" y="12" width="138" height="58" rx="5" fill="#0a1628" stroke="#1e293b" strokeWidth="1"/>
      <text x="22" y="30" fill="#475569" fontSize="8" fontFamily="monospace" letterSpacing="1">ETA PARADIP</text>
      <text x="22" y="50" fill={deviated?"#ef4444":"#22c55e"} fontSize="22" fontFamily="monospace" fontWeight="600">DAY {etaDay}</text>
      <text x="22" y="63" fill={deviated?"#f59e0b":"#475569"} fontSize="8.5" fontFamily="monospace">{deviated?("+"+etaDelay+"d delay"):"on schedule"}</text>
      <rect x="438" y="12" width="148" height="30" rx="5" fill="#0a1628" stroke="#1e293b" strokeWidth="1"/>
      <circle cx="454" cy="27" r="5" fill={statusColor}>{deviated&&<animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/>}</circle>
      <text x="464" y="27" fill={statusColor} fontSize="10" fontFamily="monospace" dominantBaseline="middle" letterSpacing="1.5">{statusLabel}</text>
      <rect x="12" y="346" width="188" height="42" rx="4" fill="#0a1628" stroke="#1e293b" strokeWidth="0.8" opacity="0.9"/>
      {[{c:"#22c55e",l:"Normal (on route / good stock)"},{c:"#f59e0b",l:"Watch (deviation / elevated)"},{c:"#ef4444",l:"Alert (feed risk / congestion)"}].map(function(item,i){
        return (<g key={i} transform={"translate(20,"+(355+i*11)+")"}><circle cx="0" cy="0" r="3.5" fill={item.c}/><text x="9" y="0" fill="#64748b" fontSize="8" fontFamily="monospace" dominantBaseline="middle">{item.l}</text></g>);
      })}
    </svg>
  );
}

/* ─── InvBar ─── */
function InvBar({plant,step,executed}){
  /* Bhilai: baseline 14d → disrupted 4d (14 - 6d vessel - 4d congestion = 4d)
     Resolved (priority rake): 4d + 2.5d rail saving = 6.5d → above 5d minimum
     Other plants unaffected by this vessel/port event               */
  var bhilaiResolved = executed && plant.id==="bhilai";
  var eff=step<2?plant.inventory:bhilaiResolved?6.5:(plant.id==="bhilai"?4:plant.inventory);
  var v=useAnimNum(Math.round(eff));
  var pct=Math.min((eff/30)*100,100);
  var color=invColor(bhilaiResolved?6.5:v, plant.threshold);
  var risk=plant.id==="bhilai"&&step>=2&&!executed;
  return (
    <div style={{marginBottom:13}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
        <div style={{display:"flex",alignItems:"center",gap:7}}>
          <span style={{fontFamily:"monospace",fontSize:9,color:"#64748b",letterSpacing:1}}>{plant.short}</span>
          <span style={{fontSize:9,color:"#475569"}}>{plant.name}</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          {risk&&<span className="pulse-anim" style={{fontSize:7.5,fontWeight:700,letterSpacing:1.5,color:"#ef4444",border:"1px solid #ef4444",padding:"1px 5px",borderRadius:2}}>FEED RISK</span>}
          {bhilaiResolved&&<span className="fadein-anim" style={{fontSize:7.5,fontWeight:700,letterSpacing:1.5,color:"#22c55e",border:"1px solid #22c55e",padding:"1px 5px",borderRadius:2}}>RESOLVED</span>}
          <span style={{fontFamily:"monospace",fontSize:13,color,fontWeight:600}}>{v}d</span>
        </div>
      </div>
      <div style={{height:5,background:"#1e293b",borderRadius:3,overflow:"hidden",position:"relative"}}>
        <div style={{height:"100%",width:pct+"%",background:color,borderRadius:3,transition:"width 0.8s ease,background 0.5s ease"}}/>
        <div style={{position:"absolute",top:0,left:((plant.threshold/30)*100)+"%",width:1,height:"100%",background:"#ef444488"}}/>
      </div>
      <div style={{textAlign:"right",marginTop:2}}><span style={{fontSize:7.5,color:"#334155"}}>threshold {plant.threshold}d</span></div>
    </div>
  );
}

/* ─── Step progress bar ─── */
function StepBar({step}){
  var steps=["SIGNAL","IMPACT","ACTION","RESOLVED"];
  var colors=["#3b82f6","#ef4444","#3b82f6","#22c55e"];
  return (
    <div style={{display:"flex",alignItems:"center",gap:2}}>
      {steps.map(function(l,i){
        var active=step-1===i; var done=step-1>i;
        var c=done||active?colors[i]:"#1e293b";
        return (
          <div key={i} style={{display:"flex",alignItems:"center"}}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              <div style={{width:18,height:18,borderRadius:"50%",background:active?c+"22":"transparent",border:"1.5px solid "+c,display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.4s"}}>
                {done&&<span style={{fontSize:9,color:c}}>✓</span>}
                {active&&<div style={{width:7,height:7,borderRadius:"50%",background:c,animation:"pulse 1s infinite"}}/>}
              </div>
              <span style={{fontSize:7,fontFamily:"monospace",color:done||active?c:"#1e293b",transition:"color 0.4s"}}>{l}</span>
            </div>
            {i<steps.length-1&&<div style={{width:18,height:1,background:done?c:"#1e293b",marginBottom:14,transition:"background 0.5s"}}/>}
          </div>
        );
      })}
    </div>
  );
}

/* ─── MAIN ─── */
function SAILDemo(){
  var ss=useState(0); var step=ss[0]; var setStep=ss[1];
  var cs=useState(new Date()); var clock=cs[0]; var setClock=cs[1];
  var as=useState(null); var selId=as[0]; var setSelId=as[1];
  var es=useState(false); var executed=es[0]; var setExecuted=es[1];
  var ls=useState([0,1]); var visLogs=ls[0]; var setVisLogs=ls[1];
  var ns=useState(null); var newIdx=ns[0]; var setNewIdx=ns[1];

  useEffect(function(){var t=setInterval(function(){setClock(new Date());},1000);return function(){clearInterval(t);};},[]);

  /* cascade logs when step changes */
  useEffect(function(){
    if(step===1){
      setVisLogs([0,1]);
      var t1=setTimeout(function(){setVisLogs([0,1,2]);setNewIdx(2);},500);
      var t2=setTimeout(function(){setVisLogs([0,1,2,3]);setNewIdx(3);},1300);
      var t3=setTimeout(function(){setNewIdx(null);},2100);
      return function(){clearTimeout(t1);clearTimeout(t2);clearTimeout(t3);};
    }
    if(step===2){
      setVisLogs([0,1,2,3]);

                    </div>
                    <div style={{fontSize:8.5,color:"#475569",lineHeight:1.45,marginBottom:4}}>{a.detail}</div>
                    <div style={{display:"flex",justifyContent:"space-between"}}>
                      <span style={{fontSize:8,fontFamily:"monospace",color:a.color}}>{a.cost}</span>
                      <span style={{fontSize:7.5,color:"#334155",fontFamily:"monospace"}}>{a.riskLabel}</span>
                    </div>
                  </div>
                );
              })}
              {selId&&(
                <button onClick={execute} className="shimmer-btn" style={{width:"100%",padding:"10px",border:"none",borderRadius:6,cursor:"pointer",color:"#fff",fontSize:10,fontWeight:700,letterSpacing:0.8,marginTop:2}}>
                  ▶  EXECUTE ACTION
                </button>
              )}
            </div>
          )}

          {/* ── OUTCOME ── */}
          {executed&&selAction&&(
            <div className="fadein-anim" style={{background:"#070f09",border:"1.5px solid "+selAction.color+"45",borderRadius:8,padding:12}}>
              <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:10}}>
                <span style={{fontSize:15}}>{selAction.icon}</span>
                <div style={{fontSize:8,color:selAction.color,letterSpacing:1.5,fontFamily:"monospace"}}>ACTION EXECUTED</div>
              </div>
              <div style={{fontSize:9.5,fontWeight:600,color:"#e2e8f0",marginBottom:6}}>{selAction.label}</div>
              <div style={{background:"#0a1628",borderRadius:6,padding:"10px 12px",border:"1px solid "+selAction.color+"25",marginBottom:10}}>
                <div style={{fontSize:8,color:"#475569",fontFamily:"monospace",marginBottom:5,letterSpacing:1}}>OUTCOME</div>
                <div style={{fontSize:9.5,color:selAction.outcomeColor,lineHeight:1.65}}>{selAction.outcome}</div>
              </div>
              {selAction.metrics.map(function(kv,i){
                return (
                  <div key={i} className="fadein-anim" style={{display:"flex",justifyContent:"space-between",marginBottom:5,animationDelay:(i*0.08)+"s"}}>
                    <span style={{fontSize:9,color:"#64748b"}}>{kv[0]}</span>
                    <span style={{fontFamily:"monospace",fontSize:9,color:selAction.outcomeColor,fontWeight:500}}>{kv[1]}</span>
                  </div>
                );
              })}
            </div>
          )}

          {/* CONTROLS */}
          <div style={{marginTop:"auto",display:"flex",flexDirection:"column",gap:8}}>
            {step<3&&(
              <button onClick={advance} style={{width:"100%",padding:"9px 12px",background:"linear-gradient(135deg,#1d4ed8,#0ea5e9)",border:"none",borderRadius:6,cursor:"pointer",color:"#fff",fontSize:10,fontWeight:600,letterSpacing:0.5}}>
                {step===0?"▶  SIMULATE DEVIATION":step===1?"▶  CALCULATE IMPACT":"▶  SHOW RECOMMENDATIONS"}
              </button>
            )}
            <button onClick={reset} style={{width:"100%",padding:"8px 12px",background:"transparent",border:"1px solid #1e293b",borderRadius:6,cursor:"pointer",color:"#475569",fontSize:10}}>
              ↺  RESET SIMULATION
            </button>
          </div>

          <div style={{fontSize:8,color:"#1e293b",textAlign:"center",fontFamily:"monospace"}}>secondbrains.ai · Confidential · Demo Build</div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(SAILDemo));
</script>
</body>
</html>
