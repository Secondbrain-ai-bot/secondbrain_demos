<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Defence BOM Intelligence Platform — Project Akash</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-base:      #0a0c10;
    --bg-panel:     #0e1118;
    --bg-card:      #131720;
    --bg-elevated:  #1a2030;
    --bg-hover:     #1e2535;
    --border:       #1e2a3a;
    --border-light: #253040;
    --border-bright:#2e4060;

    --text-primary:  #e8ecf2;
    --text-secondary:#7a8a9c;
    --text-muted:    #445060;
    --text-mono:     #a0b4c8;

    --accent-blue:   #2d6ef7;
    --accent-blue-dim:#1a3d8a;
    --accent-blue-glow: rgba(45,110,247,0.15);

    --red:       #e8433a;
    --red-dim:   #1f0f0e;
    --red-mid:   #3d1514;
    --red-text:  #f07570;
    --red-border:#5a1e1c;

    --amber:       #e8941a;
    --amber-dim:   #1c1505;
    --amber-mid:   #3d2b08;
    --amber-text:  #f0ad50;
    --amber-border:#5a3d0a;

    --green:       #22c55e;
    --green-dim:   #051a0f;
    --green-mid:   #0d3520;
    --green-text:  #4ade80;
    --green-border:#1a5c30;

    --purple:       #7c3aed;
    --purple-dim:   #120c24;
    --purple-mid:   #1e1040;
    --purple-text:  #a78bfa;
    --purple-border:#3d1f8a;
    --purple-glow:  rgba(124,58,237,0.2);

    --cyan:       #06b6d4;
    --cyan-dim:   #041218;
    --cyan-text:  #67e8f9;
    --cyan-border:#0a4050;
  }

  body {
    font-family: 'IBM Plex Sans', -apple-system, sans-serif;
    background: var(--bg-base);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 0;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg-base); }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }

  button { font-family: inherit; }

  /* Animations */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: scale(0.97) translateY(-6px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes pulse-ring {
    0%   { transform: scale(0.85); opacity: 0.5; }
    70%  { transform: scale(1.4);  opacity: 0; }
    100% { transform: scale(1.4);  opacity: 0; }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes hash-scroll {
    from { transform: translateY(0); }
    to   { transform: translateY(-50%); }
  }
  @keyframes scanline {
    0%   { background-position: 0 0; }
    100% { background-position: 0 100px; }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes rowIn {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes glow-pulse {
    0%, 100% { box-shadow: 0 0 8px rgba(34,197,94,0.3); }
    50% { box-shadow: 0 0 20px rgba(34,197,94,0.6); }
  }

  .modal-card { animation: slideIn 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
  .zk-reveal  { animation: fadeInUp 0.3s ease both; }
  .row-in     { animation: rowIn 0.25s ease both; }

  .hash-stream {
    animation: hash-scroll 4s linear infinite;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: #1e4a3a;
    line-height: 2;
  }
  .hash-stream .active { color: #22c55e !important; }

  .tab-btn {
    position: relative;
    padding: 12px 22px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-secondary);
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .tab-btn:hover { color: var(--text-primary); background: var(--bg-elevated); }
  .tab-btn.active { color: var(--accent-blue); border-bottom-color: var(--accent-blue); background: var(--accent-blue-glow); }
  .tab-btn.active-purple { color: var(--purple-text); border-bottom-color: var(--purple); background: var(--purple-glow); }

  .part-row { transition: background 0.15s, border-color 0.15s, transform 0.1s; }
  .part-row:hover { background: var(--bg-hover) !important; transform: translateX(2px); }

  .stat-card {
    position: relative;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
  }
  .stat-card:hover { transform: translateY(-2px); }

  .grid-bg {
    background-image: linear-gradient(var(--border) 1px, transparent 1px),
                      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    background-position: center;
    opacity: 0.4;
  }

  .btn-primary {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 18px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.05em;
    background: var(--accent-blue);
    color: #fff;
    border: none; border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary:hover { background: #4080ff; box-shadow: 0 0 20px rgba(45,110,247,0.4); }

  .btn-ghost {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 16px;
    font-size: 12px; font-weight: 500; letter-spacing: 0.04em;
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border-light);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-ghost:hover { background: var(--bg-elevated); color: var(--text-primary); border-color: var(--border-bright); }

  .btn-swap {
    padding: 7px 16px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
    background: var(--green-mid);
    color: var(--green-text);
    border: 1px solid var(--green-border);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-swap:hover { background: #0d3520; box-shadow: 0 0 16px rgba(34,197,94,0.25); }

  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.15s linear;
  }

  .mono { font-family: 'IBM Plex Mono', monospace; }

  .verified-glow { animation: glow-pulse 2.5s ease-in-out infinite; }

  .chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    border-radius: 3px;
    white-space: nowrap;
    font-family: 'IBM Plex Mono', monospace;
  }

  .dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border-light), transparent);
    margin: 16px 0;
  }

  .inset-panel {
    background: var(--bg-base);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 14px;
  }

  .kv-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .kv-row:last-child { border-bottom: none; }

  /* Scanline effect */
  .terminal {
    background: #020a05;
    border: 1px solid var(--green-border);
    border-radius: 4px;
    padding: 12px 14px;
    overflow: hidden;
    position: relative;
  }
  .terminal::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
    pointer-events: none;
  }

  /* Header top bar */
  .topbar {
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    align-items: center;
    height: 48px;
    gap: 24px;
  }
  .topbar-brand {
    font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--accent-blue);
    font-family: 'IBM Plex Mono', monospace;
  }
  .topbar-sep { width: 1px; height: 20px; background: var(--border-light); }
  .topbar-label {
    font-size: 11px; color: var(--text-muted); letter-spacing: 0.06em;
    font-family: 'IBM Plex Mono', monospace;
    text-transform: uppercase;
  }
  .topbar-value {
    font-size: 11px; color: var(--text-secondary);
    font-family: 'IBM Plex Mono', monospace;
  }
  .live-indicator {
    display: flex; align-items: center; gap: 6px;
    margin-left: auto;
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
    color: var(--green-text);
    font-family: 'IBM Plex Mono', monospace;
    text-transform: uppercase;
  }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    animation: blink 1.4s ease-in-out infinite;
  }
</style>
</head>

// ── Primitives ──────────────────────────────────────────────────────────────────

function Chip({ label, color = "gray", dot = false }) {
  const col = C[color] || C.gray;
  return (
    <span className="chip" style={{ background: col.bg, color: col.text, border: `1px solid ${col.border}` }}>
      {dot && <span className="dot" style={{ background: col.dot }} />}
      {label}
    </span>
  );
}

function StatusChip({ status }) {
  const m = {
    sanctioned: { label:"SANCTIONED", color:"red" },
    eol:        { label:"EOL RISK",   color:"amber" },
    amber:      { label:"MONITOR",    color:"amber" },
    clear:      { label:"CLEAR",      color:"green" },
  };
  const s = m[status] || m.clear;
  return <Chip label={s.label} color={s.color} dot />;
}

function ZKChip({ status }) {
  const m = {
    verified: { label:"ZK VERIFIED", color:"green" },
    expired:  { label:"PROOF EXPIRED", color:"amber" },
    pending:  { label:"PENDING", color:"gray" },
  };
  const s = m[status] || m.gray;
  return <Chip label={s.label} color={s.color} dot />;
}

function SectionLabel({ children }) {
  return (
    <div style={{ fontSize:10, fontWeight:700, letterSpacing:"0.12em", textTransform:"uppercase", color:"var(--text-muted)", marginBottom:12, display:"flex", alignItems:"center", gap:8 }}>

      {children}
      <span style={{ flex:1, height:1, background:"var(--border)" }}/>
    </div>
  );
}

// ── Modal Shell ───────────────────────────────────────────────────────────────
function Overlay({ onClose, wide, children }) {
  useEffect(() => {
    const h = e => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", h);
    document.body.style.overflow = "hidden";
    return () => { window.removeEventListener("keydown", h); document.body.style.overflow = ""; };
  }, [onClose]);

  return (
    <div onClick={onClose} style={{
      position:"fixed", inset:0, zIndex:300,
      background:"rgba(0,0,0,0.78)",
      backdropFilter:"blur(4px)",
      display:"flex", alignItems:"center", justifyContent:"center", padding:24,
    }}>
      <div className="modal-card" onClick={e => e.stopPropagation()} style={{
        background:"var(--bg-panel)",
        border:"1px solid var(--border-light)",
        borderRadius:8,
        maxWidth: wide ? 780 : 600,
        width:"100%",
        padding:28,
        maxHeight:"90vh",
        overflowY:"auto",
        boxShadow:"0 24px 80px rgba(0,0,0,0.7)",
      }}>
        {children}
      </div>
    </div>
  );
}

        </div>
        <div style={{ fontSize:18, fontWeight:600, color:"var(--text-primary)", letterSpacing:"-0.01em" }}>{title}</div>

      </div>
      <button onClick={onClose} style={{
        background:"var(--bg-elevated)", border:"1px solid var(--border-light)",
        width:30, height:30, borderRadius:4, cursor:"pointer",
        color:"var(--text-secondary)", fontSize:16, lineHeight:1,
        display:"flex", alignItems:"center", justifyContent:"center",
        flexShrink:0, marginLeft:16, transition:"all 0.15s",

      >×</button>
    </div>
  );
}

// ── ZK Modal ──────────────────────────────────────────────────────────────────
function ZKModal({ s, onClose, onAttest }) {
  const [step, setStep] = useState(0);
  const [progress, setProgress] = useState(0);
  const [newBlockHeight, setNewBlockHeight] = useState(null);
  const [newTs, setNewTs] = useState(null);

  const isExpired = s.proofStatus === "expired";
  const isPending = s.proofStatus === "pending";
  const col = s.proofStatus === "verified" ? C.green : s.proofStatus === "expired" ? C.amber : C.gray;

  function runDemo() {
    setStep(1); setProgress(0);
    let p = 0;
    const iv = setInterval(() => {
      p += Math.random() * 14 + 4;
      if (p >= 100) {
        p = 100; clearInterval(iv);
        setStep(2);
        setTimeout(() => {
          const newBlock = 4400000 + Math.floor(Math.random() * 5000);
          const ts = new Date();
          const tsStr = ts.toISOString().replace("T"," ").slice(0,16) + " UTC";
          setNewBlockHeight(newBlock);
          setNewTs(tsStr);
          setStep(3);
          // Propagate the attestation back up to parent
          if (onAttest) onAttest(s.id, newBlock, tsStr);
        }, 900);
      }
      setProgress(Math.min(p, 100));
    }, 140);
  }

  // Determine displayed status (after step=3, treat as verified)
  const displayStatus = step === 3 ? "verified" : s.proofStatus;
  const displayCol = step === 3 ? C.green : col;

  const eventColor = (ev) => {
    if (ev.event.includes("Expired") || ev.event.includes("Failed")) return "var(--red)";
    if (ev.event.includes("Verified") || ev.event.includes("Re-verified")) return "var(--green)";
    if (ev.event.includes("Submitted")) return "var(--accent-blue)";
    return "var(--purple)";
  };

  const today = new Date().toISOString().slice(0,10);
  const expiry = new Date(today); expiry.setFullYear(expiry.getFullYear()+1);
  const expiryStr = expiry.toISOString().slice(0,10);

  return (
    <Overlay onClose={onClose} wide>
      <ModalHeader
        tag="Zero-Knowledge Proof — Blockchain Attestation"
        title={s.component}
        sub={`${s.ref}  ·  ${s.supplier}  ·  ${s.tier}`}
        onClose={onClose}
      />

      {/* Status + sanction lists */}
      <div style={{ display:"flex", gap:12, marginBottom:20, flexWrap:"wrap" }}>
        {/* Attestation status */}
        <div style={{
          flex:1, minWidth:200,
          background: displayCol.bg,
          border:`1px solid ${displayCol.border}`,
          borderRadius:6, padding:"14px 16px",
          transition:"all 0.4s",
        }}
        className={step === 3 ? "verified-glow" : ""}
        >
          <div style={{ fontSize:9, fontWeight:700, letterSpacing:"0.12em", textTransform:"uppercase", color: displayCol.text, marginBottom:10, fontFamily:"'IBM Plex Mono',monospace" }}>Attestation Status</div>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
            <div style={{ position:"relative", width:36, height:36, flexShrink:0 }}>
              {displayStatus === "verified" && (
                <div style={{ position:"absolute", inset:0, borderRadius:"50%", background:"var(--green)", opacity:0.2, animation:"pulse-ring 2s ease infinite" }}/>
              )}
              <div style={{
                position:"absolute", inset:4, borderRadius:"50%",
                background: displayCol.dot,
                display:"flex", alignItems:"center", justifyContent:"center",
                color:"#fff", fontSize:14, fontWeight:700,
                transition:"background 0.4s",
              }}>
                {displayStatus === "verified" ? "✓" : displayStatus === "expired" ? "!" : "…"}
              </div>
            </div>
            <div>
              <div style={{ fontSize:14, fontWeight:700, color: displayCol.text, transition:"color 0.4s" }}>
                {displayStatus === "verified" ? "Verified & Active" : displayStatus === "expired" ? "Proof Expired" : "Awaiting Proof"}
              </div>
              <div style={{ fontSize:11, color: displayCol.text, fontFamily:"'IBM Plex Mono',monospace", marginTop:2, opacity:0.8 }}>
                {step === 3
                  ? `Attested: ${today}  ·  Expires: ${expiryStr}`
                  : s.attestedOn ? `Attested: ${s.attestedOn}  ·  Expires: ${s.expiresOn}` : "Not yet attested"}
              </div>
            </div>
          </div>
          {(s.proofHash || step === 3) && (
            <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:10, color: displayCol.text, background:"rgba(0,0,0,0.25)", borderRadius:4, padding:"5px 8px", wordBreak:"break-all", marginBottom:6 }}>
              {step === 3 ? `0x${Math.random().toString(16).slice(2,10)}...${Math.random().toString(16).slice(2,10)}` : s.proofHash}
            </div>
          )}
          {(s.blockHeight || step === 3) && (
            <div style={{ fontSize:10, color: displayCol.text, fontFamily:"'IBM Plex Mono',monospace", opacity:0.8 }}>
              Block #{(step === 3 ? newBlockHeight : s.blockHeight)?.toLocaleString()}
            </div>
          )}
        </div>

        {/* Sanction lists */}
        <div style={{ flex:1, minWidth:180, background:"var(--bg-card)", border:"1px solid var(--border)", borderRadius:6, padding:"14px 16px" }}>
          <div style={{ fontSize:9, fontWeight:700, letterSpacing:"0.12em", textTransform:"uppercase", color:"var(--text-muted)", marginBottom:10, fontFamily:"'IBM Plex Mono',monospace" }}>Sanction Lists Verified</div>
          {s.sanctionLists.map(l => (
            <div key={l} style={{ display:"flex", alignItems:"center", gap:8, marginBottom:7, fontSize:12, color:"var(--text-primary)" }}>
              <span style={{ color: displayStatus==="verified" ? "var(--green)" : "var(--text-muted)", fontSize:13, transition:"color 0.4s" }}>
                {displayStatus==="verified" ? "✓" : "○"}
              </span>
              {l}
            </div>
          ))}
          <div style={{ fontSize:10, color:"var(--text-muted)", marginTop:8, fontStyle:"italic", fontFamily:"'IBM Plex Mono',monospace" }}>Zero supplier identities revealed.</div>
        </div>
      </div>

      {/* ZK details */}
      <div style={{ background:"var(--purple-dim)", border:"1px solid var(--purple-border)", borderRadius:6, padding:"14px 16px", marginBottom:20 }}>
        <div style={{ fontSize:9, fontWeight:700, letterSpacing:"0.12em", textTransform:"uppercase", color:"var(--purple-text)", marginBottom:8, fontFamily:"'IBM Plex Mono',monospace" }}>How the ZK Proof Works</div>
        <p style={{ fontSize:13, color:"var(--purple-text)", margin:"0 0 14px", lineHeight:1.75, opacity:0.9 }}>{s.zkDetails.what}</p>
        <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:14 }}>
          {[["Circuit", s.zkDetails.circuit],["Proof Size", s.zkDetails.proofSize],["Verify Time", s.zkDetails.verifyTimeMs+"ms"]].map(([k,v]) => (
            <div key={k} style={{ background:"rgba(0,0,0,0.3)", borderRadius:5, padding:"8px 12px", flex:1, minWidth:90, border:"1px solid var(--purple-border)" }}>
              <div style={{ fontSize:9, fontWeight:700, color:"var(--purple-text)", marginBottom:4, letterSpacing:"0.1em", textTransform:"uppercase", fontFamily:"'IBM Plex Mono',monospace" }}>{k}</div>
              <div style={{ fontSize:12, fontWeight:600, color:"var(--purple-text)", fontFamily:"'IBM Plex Mono',monospace" }}>{v}</div>
            </div>
          ))}
        </div>
        <div style={{ fontSize:9, fontWeight:700, color:"var(--purple-text)", marginBottom:6, letterSpacing:"0.1em", textTransform:"uppercase", fontFamily:"'IBM Plex Mono',monospace" }}>Public Inputs (visible to verifier)</div>
        <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
          {s.zkDetails.publicInputs.map(inp => (
            <span key={inp} style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:10, background:"rgba(0,0,0,0.3)", borderRadius:3, padding:"3px 8px", color:"var(--purple-text)", border:"1px solid var(--purple-border)" }}>{inp}</span>
          ))}
        </div>
      </div>

      {/* Live verification demo */}
      <div style={{ background:"var(--bg-card)", border:"1px solid var(--border-light)", borderRadius:6, padding:"14px 16px", marginBottom:20 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
          <div style={{ fontSize:9, fontWeight:700, letterSpacing:"0.12em", textTransform:"uppercase", color:"var(--text-muted)", fontFamily:"'IBM Plex Mono',monospace" }}>Live Verification</div>
          {step === 0 && (
            <button className="btn-primary" onClick={runDemo}>
              <span>▶</span> Run Verify
            </button>
          )}
        </div>

        {step === 0 && (
          <p style={{ fontSize:12, color:"var(--text-secondary)", margin:0, lineHeight:1.7 }}>
            A fresh on-chain ZK proof verification. The verifier sees only pass/fail — zero BOM data is transmitted.
            {isExpired && <span style={{ color:"var(--amber-text)", display:"block", marginTop:6 }}>⚠ This proof is expired. Running verify will re-attest and update the Attestation Status.</span>}
            {isPending && <span style={{ color:"var(--cyan-text)", display:"block", marginTop:6 }}>↻ Proof pending. Running verify will complete attestation and update registry status.</span>}
          </p>
        )}

        {step >= 1 && step < 3 && (
          <div className="zk-reveal">
            <div style={{ fontSize:11, color:"var(--text-secondary)", marginBottom:8, fontFamily:"'IBM Plex Mono',monospace" }}>
              {step === 1 ? "› Generating witness & computing proof circuit..." : "› Submitting proof to Hyperledger Fabric node..."}
            </div>
            <div className="progress-bar" style={{ marginBottom:10 }}>
              <div className="progress-fill" style={{ width:`${Math.round(progress)}%`, background:"var(--purple)" }}/>
            </div>
            <div className="terminal" style={{ height:80 }}>
              <div className="hash-stream">
                {[...HASH_LINES,...HASH_LINES].map((h,i) => <div key={i} style={{ color: i%7===0?"var(--green)":"" }}>{h}</div>)}
              </div>
            </div>
          </div>
        )}

        {step === 3 && (
          <div className="zk-reveal" style={{ display:"flex", gap:14, alignItems:"flex-start", flexWrap:"wrap" }}>
            <div style={{ background:"var(--green-dim)", border:"2px solid var(--green-border)", borderRadius:8, padding:"16px 18px", flex:1, minWidth:150, textAlign:"center" }} className="verified-glow">
              <div style={{ fontSize:32, marginBottom:6, color:"var(--green)" }}>✓</div>
              <div style={{ fontSize:14, fontWeight:700, color:"var(--green-text)", letterSpacing:"0.06em" }}>PROOF VALID</div>
              <div style={{ fontSize:10, color:"var(--green)", marginTop:5, fontFamily:"'IBM Plex Mono',monospace" }}>No sanctioned entities detected</div>
            </div>
            <div style={{ flex:2, minWidth:180 }}>
              {[
                ["Verifier learned","PASS / FAIL only"],
                ["BOM revealed","None — zero knowledge"],
                ["Supplier identities","Hidden"],
                ["Sub-tier count","Hidden"],
                ["Anchored on-chain", `Block #${newBlockHeight?.toLocaleString()}`],
                ["Verify time", s.zkDetails.verifyTimeMs+"ms"],
              ].map(([k,v]) => (
                <div key={k} className="kv-row">
                  <span style={{ color:"var(--text-secondary)" }}>{k}</span>
                  <span style={{ fontWeight:600, color:"var(--text-primary)", fontFamily:"'IBM Plex Mono',monospace", fontSize:11 }}>{v}</span>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* Blockchain audit trail */}
      <SectionLabel>Blockchain Audit Trail</SectionLabel>
      {s.chainEvents.map((ev, i) => (
        <div key={i} style={{ display:"flex", gap:12, marginBottom:8, alignItems:"stretch" }} className="zk-reveal">
          <div style={{ display:"flex", flexDirection:"column", alignItems:"center", width:14, flexShrink:0 }}>
            <div style={{ width:10, height:10, borderRadius:"50%", flexShrink:0, background: eventColor(ev), marginTop:6 }}/>
            {i < s.chainEvents.length-1 && <div style={{ width:1, flex:1, minHeight:16, background:"var(--border)", marginTop:3 }}/>}
          </div>
          <div style={{ flex:1, background:"var(--bg-card)", border:"1px solid var(--border)", borderRadius:5, padding:"8px 12px" }}>
            <div style={{ display:"flex", justifyContent:"space-between", flexWrap:"wrap", gap:4, marginBottom:3 }}>
              <span style={{ fontSize:12, fontWeight:600, color:"var(--text-primary)", fontFamily:"'IBM Plex Mono',monospace" }}>{ev.event}</span>
              <span style={{ fontSize:10, color:"var(--text-muted)", fontFamily:"'IBM Plex Mono',monospace" }}>{ev.ts}</span>
            </div>
            <div style={{ fontSize:11, color:"var(--text-secondary)", fontFamily:"'IBM Plex Mono',monospace" }}>
              by {ev.by}{ev.block && <span style={{ marginLeft:10, color:"var(--purple-text)" }}>block #{ev.block.toLocaleString()}</span>}
            </div>
          </div>
        </div>
      ))}
      {/* Show new event after verify */}
      {step === 3 && (
        <div style={{ display:"flex", gap:12, marginBottom:8, alignItems:"stretch" }} className="zk-reveal">
          <div style={{ display:"flex", flexDirection:"column", alignItems:"center", width:14, flexShrink:0 }}>
            <div style={{ width:10, height:10, borderRadius:"50%", flexShrink:0, background:"var(--green)" }}/>
          </div>
          <div style={{ flex:1, background:"var(--green-dim)", border:"1px solid var(--green-border)", borderRadius:5, padding:"8px 12px" }}>
            <div style={{ display:"flex", justifyContent:"space-between", flexWrap:"wrap", gap:4, marginBottom:3 }}>
              <span style={{ fontSize:12, fontWeight:600, color:"var(--green-text)", fontFamily:"'IBM Plex Mono',monospace" }}>ProofVerified</span>
              <span style={{ fontSize:10, color:"var(--green)", fontFamily:"'IBM Plex Mono',monospace" }}>{newTs}</span>
            </div>
            <div style={{ fontSize:11, color:"var(--green-text)", fontFamily:"'IBM Plex Mono',monospace" }}>
              by DRDO Smart Contracts
              {newBlockHeight && <span style={{ marginLeft:10 }}>block #{newBlockHeight?.toLocaleString()}</span>}
            </div>
          </div>
        </div>
      )}

      {isExpired && step === 0 && (
        <div style={{ marginTop:16, background:"var(--amber-dim)", border:"1px solid var(--amber-border)", borderRadius:6, padding:"12px 14px" }}>
          <div style={{ fontSize:9, fontWeight:700, letterSpacing:"0.12em", textTransform:"uppercase", color:"var(--amber-text)", marginBottom:6, fontFamily:"'IBM Plex Mono',monospace" }}>⚠ Action Required</div>
          <p style={{ fontSize:13, color:"var(--amber-text)", margin:0, lineHeight:1.7 }}>Supplier must re-generate and submit a new ZK proof against the current SCOMET list (updated Q4 2025). The existing on-chain commitment hash is retained for audit purposes — only the attestation validity window has lapsed.</p>
        </div>
      )}
    </Overlay>
  );
}

// ── Sovereignty Meter ─────────────────────────────────────────────────────────
function SovereigntyMeter({ score, target }) {
  const pct = Math.min(score, 100);
  const reached = pct >= target;
  const barColor = reached ? "var(--green)" : pct > 35 ? "var(--amber)" : "var(--red)";

  return (
    <div style={{ background:"var(--bg-card)", border:"1px solid var(--border-light)", borderRadius:8, padding:"20px 22px", marginBottom:4 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:16, flexWrap:"wrap", gap:6 }}>
        <span style={{ fontSize:13, fontWeight:600, color:"var(--text-primary)", letterSpacing:"-0.01em" }}>Sovereignty Scorecard — Buy Indian IDDM</span>
        <span style={{ fontSize:10, color:"var(--text-secondary)", fontFamily:"'IBM Plex Mono',monospace" }}>TARGET: {target}% INDIGENOUS CONTENT</span>
      </div>

      {/* Big number */}
      <div style={{ display:"flex", alignItems:"baseline", gap:10, marginBottom:14 }}>
        <span style={{ fontSize:48, fontWeight:700, color: barColor, lineHeight:1, transition:"color 0.4s, font-variant-numeric 0.2s", fontVariantNumeric:"tabular-nums" }}>{Math.round(pct)}</span>
        <span style={{ fontSize:18, color:"var(--text-muted)", fontWeight:300 }}>% IC</span>
        <span style={{ marginLeft:8, fontSize:11, padding:"3px 9px", borderRadius:3, background: reached ? "var(--green-dim)" : "var(--red-dim)", color: reached ? "var(--green-text)" : "var(--red-text)", border:`1px solid ${reached ? "var(--green-border)" : "var(--red-border)"}`, fontWeight:700, letterSpacing:"0.08em", fontFamily:"'IBM Plex Mono',monospace" }}>
          {reached ? "✓ FORM-J ELIGIBLE" : "✗ BELOW TARGET"}
        </span>
      </div>

      {/* Bar */}
      <div style={{ position:"relative", height:8, background:"var(--bg-elevated)", borderRadius:4, overflow:"hidden", marginBottom:10, border:"1px solid var(--border)" }}>
        <div style={{ position:"absolute", left:0, top:0, bottom:0, width:`${pct}%`, background: barColor, borderRadius:4, transition:"width 0.65s cubic-bezier(.4,0,.2,1), background 0.4s", boxShadow:`0 0 12px ${barColor}60` }}/>
        <div style={{ position:"absolute", left:`${target}%`, top:0, bottom:0, width:2, background:"var(--accent-blue)" }}/>
      </div>
      <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, color:"var(--text-muted)", fontFamily:"'IBM Plex Mono',monospace" }}>
        <span>0%</span>
        <span style={{ color:"var(--accent-blue)" }}>▲ {target}% target</span>
        <span>100%</span>
      </div>
    </div>
  );
}

// ── Header Stat Card ──────────────────────────────────────────────────────────
function StatCard({ n, label, color }) {
  const col = C[color] || C.gray;
  return (
    <div className="stat-card" style={{
      textAlign:"center", background: col.bg, border:`1px solid ${col.border}`,
      borderRadius:6, padding:"12px 18px", minWidth:72,
    }}>
      <div style={{ fontSize:26, fontWeight:700, color: col.text, fontVariantNumeric:"tabular-nums", lineHeight:1, marginBottom:4 }}>{n}</div>

  );
}

function App() {
  const [tab, setTab]         = useState("bom");
  const [selPart, setSelPart] = useState(null);
  const [modalT, setModalT]   = useState(null);
  const [swapped, setSwapped] = useState({});
  const [zkSel, setZkSel]     = useState(null);
  // Track attested ZK entries (id -> { blockHeight, ts })
  const [zkAttested, setZkAttested] = useState({});

  // Build ZK suppliers merging attestation overrides
  const zkSuppliers = ZK_SUPPLIERS_INIT.map(s => {
    if (zkAttested[s.id]) {
      const a = zkAttested[s.id];
      const today = new Date().toISOString().slice(0,10);
      const expiry = new Date(today); expiry.setFullYear(expiry.getFullYear()+1);
      return {
        ...s,
        proofStatus: "verified",
        blockHeight: a.blockHeight,
        attestedOn: today,
        expiresOn: expiry.toISOString().slice(0,10),
        proofHash: `0x${Math.random().toString(16).slice(2,10)}...${Math.random().toString(16).slice(2,10)}`,
        chainEvents: [
          ...s.chainEvents,
          { block: a.blockHeight, event: "ProofVerified", by: "DRDO Smart Contracts", ts: a.ts },
        ],
      };
    }
    return s;
  });

  function handleAttest(id, blockHeight, ts) {
    setZkAttested(prev => ({ ...prev, [id]: { blockHeight, ts } }));
    // Also update the selected entry so modal reflects new state
    if (zkSel && zkSel.id === id) {
      setZkSel(prev => ({
        ...prev,
        proofStatus: "verified",
        blockHeight,
        attestedOn: new Date().toISOString().slice(0,10),

  }

  const parts = PARTS.map(p =>

  const nClr     = parts.filter(p => p.status === "clear").length;
  const nZkVer   = zkSuppliers.filter(s => s.proofStatus === "verified").length;
  const nZkExp   = zkSuppliers.filter(s => s.proofStatus === "expired").length;
  const nZkPend  = zkSuppliers.filter(s => s.proofStatus === "pending").length;

        <div><span className="topbar-label">Programme </span><span className="topbar-value"> UAV Propulsion System</span></div>
        <div className="topbar-sep"/>

      {/* Main layout */}
      <div style={{ maxWidth:1040, margin:"0 auto", padding:"24px 24px 60px" }}>

        {/* Header */}
        <div style={{ background:"var(--bg-panel)", border:"1px solid var(--border-light)", borderRadius:8, padding:"22px 26px", marginBottom:16, position:"relative", overflow:"hidden" }}>
          {/* Grid background decoration */}
          <div style={{
            position:"absolute", inset:0, pointerEvents:"none",
            backgroundImage:"linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px)",
            backgroundSize:"40px 40px", opacity:0.3,
          }}/>
          <div style={{ position:"relative", display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:20 }}>
            <div>
              <div style={{ fontSize:9, fontWeight:700, letterSpacing:"0.16em", color:"var(--text-muted)", marginBottom:8, fontFamily:"'IBM Plex Mono',monospace", textTransform:"uppercase" }}>
                Defence BOM Intelligence Platform
              </div>
              <h1 style={{ fontSize:24, fontWeight:700, color:"var(--text-primary)", margin:"0 0 8px", letterSpacing:"-0.02em" }}>
                Project Akash
              </h1>
              <p style={{ fontSize:13, color:"var(--text-secondary)", margin:0 }}>
                UAV Propulsion System  ·  DRDO Programme Office
              </p>
            </div>
            <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
              <StatCard n={nSnc}   label="SANCTIONED"  color="red"    />
              <StatCard n={nEol}   label="EOL RISK"    color="amber"  />
              <StatCard n={nClr}   label="CLEAR"       color="green"  />
              <StatCard n={nZkVer} label="ZK VERIFIED" color="purple" />
            </div>
          </div>
        </div>

        {/* Tabs */}
        <div style={{ display:"flex", background:"var(--bg-panel)", borderRadius:"8px 8px 0 0", border:"1px solid var(--border-light)", borderBottom:"none", overflow:"hidden" }}>
          {TABS.map(({ key, label }) => {
            const active = tab === key;
            const isZk = key === "zkproof";
            return (
              <button
                key={key}
                onClick={() => setTab(key)}
                className={`tab-btn ${active ? (isZk ? "active-purple" : "active") : ""}`}
              >
                {label}
              </button>
            );
          })}
        </div>

        {/* Tab content */}
        <div style={{ background:"var(--bg-panel)", borderRadius:"0 0 8px 8px", border:"1px solid var(--border-light)", padding:"22px 26px", minHeight:400 }}>

          {/* ── BOM Risk View ── */}
          {tab === "bom" && (
            <>
              <p style={{ fontSize:12, color:"var(--text-secondary)", marginBottom:18 }}>
                Click any flagged component to inspect recursive provenance or obsolescence detail.
              </p>
              <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                {parts.map((p, idx) => {
                  const flagged = ["sanctioned","eol","amber"].includes(p.status);
                  const bc = p.status==="sanctioned" ? "var(--red-border)" : ["eol","amber"].includes(p.status) ? "var(--amber-border)" : "var(--border)";
                  const bg = p.status==="sanctioned" ? "var(--red-dim)" : ["eol","amber"].includes(p.status) ? "var(--amber-dim)" : "var(--bg-card)";
                  return (
                    <div
                      key={p.id}
                      className={flagged ? "part-row" : ""}
                      onClick={() => {
                        if (p.status==="sanctioned") { setSelPart(p); setModalT("trace"); }
                        else if (["eol","amber"].includes(p.status)) { setSelPart(p); setModalT("eol"); }
                      }}
                      style={{
                        background: bg, border:`1px solid ${bc}`, borderRadius:6,
                        padding:"12px 16px", display:"flex", alignItems:"center",
                        gap:14, flexWrap:"wrap",
                        cursor: flagged ? "pointer" : "default",
                        animationDelay:`${idx*0.04}s`,
                      }}
                    >
                      <div style={{ flex:1, minWidth:200 }}>
                        <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:4, flexWrap:"wrap" }}>
                          <span style={{ fontSize:13, fontWeight:600, color:"var(--text-primary)" }}>{p.name}</span>
                          <StatusChip status={p.status}/>
                        </div>
                        <div style={{ fontSize:11, color:"var(--text-secondary)", fontFamily:"'IBM Plex Mono',monospace" }}>{p.ref}  ·  {p.supplier}</div>
                      </div>
                      <div style={{ display:"flex", gap:8, alignItems:"center", flexShrink:0, flexWrap:"wrap" }}>
                        <Chip label={p.category} color="gray"/>
                        <Chip label={p.icSource} color={p.icSource==="Indian" ? "green" : "gray"}/>
                        {p.status==="sanctioned" && <span style={{ fontSize:11, color:"var(--red-text)", fontWeight:600, fontFamily:"'IBM Plex Mono',monospace" }}>View Trace →</span>}
                        {["eol","amber"].includes(p.status) && <span style={{ fontSize:11, color:"var(--amber-text)", fontWeight:600, fontFamily:"'IBM Plex Mono',monospace" }}>Life-Clock →</span>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </>
          )}

          {/* ── Sovereignty ── */}
          {tab === "sovereignty" && (
            <>
              <SovereigntyMeter score={icScore} target={50}/>
              <div style={{ height:18 }}/>
              <SectionLabel>Active Deselection — Swap Foreign Parts for Indigenous Alternatives</SectionLabel>
              <p style={{ fontSize:12, color:"var(--text-secondary)", marginBottom:16 }}>Each swap updates your IC score in real time. Items marked ↗ have approved indigenous substitutes.</p>
              <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                {parts.map(p => {
                  const canSwap = !!SWAPS[p.id] && !swapped[p.id];
                  const isSw = !!swapped[p.id];
                  return (
                    <div key={p.id} style={{
                      background: isSw ? "var(--green-dim)" : "var(--bg-card)",
                      border:`1px solid ${isSw ? "var(--green-border)" : "var(--border)"}`,
                      borderRadius:6, padding:"12px 16px",
                      display:"flex", alignItems:"center", gap:14, flexWrap:"wrap",
                      transition:"background 0.3s, border-color 0.3s",
                    }}>
                      <div style={{ flex:1, minWidth:220 }}>
                        <div style={{ fontSize:13, fontWeight:600, color:"var(--text-primary)", marginBottom:3 }}>{p.name}</div>
                        <div style={{ fontSize:11, color:"var(--text-secondary)", fontFamily:"'IBM Plex Mono',monospace" }}>{p.supplier}</div>
                        {isSw && <div style={{ fontSize:10, color:"var(--green-text)", fontWeight:700, marginTop:5, letterSpacing:"0.08em", fontFamily:"'IBM Plex Mono',monospace" }}>✓ SWAPPED — Indigenous substitute active</div>}
                      </div>
                      <div style={{ display:"flex", gap:8, alignItems:"center", flexShrink:0 }}>
                        <span style={{ fontSize:14, fontWeight:700, color: p.icContrib>0 ? "var(--green-text)" : "var(--text-muted)", fontFamily:"'IBM Plex Mono',monospace" }}>+{p.icContrib}%</span>
                        {canSwap && (
                          <button className="btn-swap" onClick={() => setSwapped(s => ({...s,[p.id]:true}))}>
                            Deselect &amp; Swap ↗
                          </button>
                        )}
                        {isSw && (
                          <button className="btn-ghost" onClick={() => setSwapped(s => { const n={...s}; delete n[p.id]; return n; })}>

                          </button>
                        )}
                        {!canSwap && !isSw && <span style={{ fontSize:11, color:"var(--text-muted)", fontFamily:"'IBM Plex Mono',monospace" }}>No swap available</span>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </>

              {/* Explainer */}
              <div style={{ background:"var(--purple-dim)", border:"1px solid var(--purple-border)", borderRadius:6, padding:"16px 18px", marginBottom:22 }}>
                <div style={{ fontSize:9, fontWeight:700, letterSpacing:"0.14em", textTransform:"uppercase", color:"var(--purple-text)", marginBottom:8, fontFamily:"'IBM Plex Mono',monospace" }}>How This Works</div>
                <p style={{ fontSize:13, color:"var(--purple-text)", margin:0, lineHeight:1.8, opacity:0.9 }}>
                  Suppliers who cannot share their full BOM submit a <strong>Zero-Knowledge Proof</strong> instead.
                  The proof cryptographically attests that <em>no entity in their supply chain appears on any sanctioned list</em> —
                  without revealing supplier names, sub-tier relationships, part numbers, or margins.
                  Each proof is anchored on a <strong>permissioned Hyperledger Fabric ledger</strong>: immutable, timestamped,
                  and automatically re-validated whenever sanction lists are updated. The verifier learns exactly one bit of information — <strong>pass or fail</strong>.
                </p>
              </div>

              {/* Stats */}
              <div style={{ display:"flex", gap:10, marginBottom:22, flexWrap:"wrap" }}>
                {[{n:nZkVer,l:"Verified",col:C.green},{n:nZkExp,l:"Expired",col:C.amber},{n:nZkPend,l:"Pending",col:C.gray}].map(({n,l,col}) => (
                  <div key={l} style={{ flex:1, minWidth:90, textAlign:"center", background:col.bg, border:`1px solid ${col.border}`, borderRadius:6, padding:"14px 16px" }}>
                    <div style={{ fontSize:28, fontWeight:700, color:col.text, lineHeight:1, marginBottom:5, fontVariantNumeric:"tabular-nums" }}>{n}</div>
                    <div style={{ fontSize:9, fontWeight:700, color:col.text, letterSpacing:"0.1em", fontFamily:"'IBM Plex Mono',monospace" }}>{l.toUpperCase()}</div>
                  </div>
                ))}
              </div>

              <p style={{ fontSize:12, color:"var(--text-secondary)", marginBottom:14 }}>
                Click any supplier to inspect their ZK proof, circuit details, and blockchain audit trail.
              </p>

              <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                {zkSuppliers.map(s => {
                  const col = s.proofStatus==="verified" ? C.green : s.proofStatus==="expired" ? C.amber : C.gray;
                  const icon = s.proofStatus==="verified" ? "🔐" : s.proofStatus==="expired" ? "⚠" : "◌";
                  return (
                    <div
                      key={s.id}
                      className="part-row"
                      onClick={() => setZkSel(s)}
                      style={{
                        background:"var(--bg-card)", border:`1px solid ${col.border}`,
                        borderRadius:6, padding:"14px 18px",
                        display:"flex", alignItems:"center", gap:14, flexWrap:"wrap",
                        cursor:"pointer",
                      }}
                    >
                      <div style={{ width:40, height:40, borderRadius:6, flexShrink:0, background:col.bg, border:`1px solid ${col.border}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18 }}>
                        {icon}
                      </div>
                      <div style={{ flex:1, minWidth:200 }}>
                        <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:4, flexWrap:"wrap" }}>
                          <span style={{ fontSize:13, fontWeight:600, color:"var(--text-primary)" }}>{s.component}</span>
                          <ZKChip status={s.proofStatus}/>
                          <Chip label={s.tier} color="gray"/>
                        </div>
                        <div style={{ fontSize:11, color:"var(--text-secondary)", fontFamily:"'IBM Plex Mono',monospace" }}>{s.supplier}  ·  {s.ref}</div>
                        {s.proofHash && <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:10, color:"var(--text-muted)", marginTop:3 }}>{s.proofHash}</div>}
                      </div>
                      <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:4, flexShrink:0 }}>
                        {s.attestedOn && <span style={{ fontSize:10, color:"var(--text-secondary)", fontFamily:"'IBM Plex Mono',monospace" }}>Attested {s.attestedOn}</span>}
                        {s.blockHeight && <span style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:10, color:"var(--purple-text)" }}>#{s.blockHeight.toLocaleString()}</span>}
                        <span style={{ fontSize:11, color:"var(--purple-text)", fontWeight:600, fontFamily:"'IBM Plex Mono',monospace" }}>Inspect →</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </>
          )}
        </div>
      </div>

      {/* Modals */}
      {selPart && modalT==="trace" && <TraceModal part={selPart} onClose={() => { setSelPart(null); setModalT(null); }}/>}
      {selPart && modalT==="eol"   && <EOLModal   part={selPart} onClose={() => { setSelPart(null); setModalT(null); }}/>}
      {zkSel && (
        <ZKModal
          s={zkSel}
          onClose={() => setZkSel(null)}
          onAttest={handleAttest}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
