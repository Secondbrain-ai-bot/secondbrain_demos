// RESOURCE ASSIGNMENT MODAL (Lock Operator to Stage)
// ============================================================
function ResourceAssignModal({ order, stage, stageData, existingLock, onSave, onCancel }) {
  const skillsNeeded = STAGE_OPERATOR_SKILLS[stage] || [];
  const eqId = stageData?.equipment;

  // Score operators: qualified first, then by shift compatibility
  const scoredOps = OPERATORS.map(op => {
    const hasSkill = skillsNeeded.length === 0 || skillsNeeded.some(s => op.skills.includes(s));
    const certsNeeded = EQUIPMENT_CERTS[eqId] || [];
    const hasCert = certsNeeded.length === 0 || certsNeeded.some(c => op.certs.includes(c));
    const warnings = [];
    if (!op.available) warnings.push(`Unavailable: ${op.leaveReason||'on leave'}`);
    if (!hasSkill) warnings.push(`Missing skill: ${skillsNeeded.join(' or ')}`);
    if (!hasCert && eqId) warnings.push(`Not certified for ${eqId}`);
    const feasible = warnings.length === 0;
    return { ...op, warnings, feasible, hasSkill, hasCert };
  }).sort((a,b) => {
    if (a.feasible && !b.feasible) return -1;
    if (!a.feasible && b.feasible) return 1;
    return a.name.localeCompare(b.name);
  });

  const [selectedOpId, setSelectedOpId] = useState(existingLock?.operatorId || null);
  const [note, setNote] = useState(existingLock?.note || '');

  const selectedOp = OPERATORS.find(o => o.id === selectedOpId);
  const selOpScored = scoredOps.find(o => o.id === selectedOpId);
  const canSave = !!selectedOpId;

  function handleSave() {
    if (!selectedOpId) return;
    onSave({
      poNum: order.poNum,
      stage,
      operatorId: selectedOpId,
      operatorName: selectedOp?.name,
      note,
      lockedBy: 'Planner (Manual)',
      lockedAt: new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}),
      infeasible: selOpScored?.warnings?.length > 0,
      warnings: selOpScored?.warnings || [],
    });
  }

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onCancel()}>
      <div className="modal" style={{width:'500px'}}>
        <div className="modal-header">
          <div>
            <div className="modal-title" style={{color:'#0ea5e9'}}>🔒 LOCK RESOURCE — {order.poNum} / {stage}</div>
            <div style={{fontSize:'10px',color:'var(--text-muted)',marginTop:'2px',fontFamily:'var(--mono)'}}>
              {order.customer?.name} · {eqId || 'No equipment'} · Skills needed: {skillsNeeded.join(', ')||'Any'}
            </div>
          </div>
          <div className="drawer-close" onClick={onCancel}>✕</div>
        </div>

        <div className="modal-body">
          {existingLock && (
            <div style={{background:'#0ea5e918',border:'1px solid #0ea5e944',borderRadius:'5px',padding:'8px 12px',marginBottom:'12px',fontSize:'11px',color:'#0ea5e9'}}>
              🔒 Currently locked to {existingLock.operatorName} · Locked {existingLock.lockedAt} by {existingLock.lockedBy}
            </div>
          )}

          {/* Feasibility warnings for selected op */}
          {selOpScored && selOpScored.warnings.length > 0 && (
            <div className="feasibility-warn">
              <div className="feasibility-warn-title">⚠ INFEASIBILITY DETECTED — Assignment will be flagged</div>
              {selOpScored.warnings.map((w,i) => (
                <div key={i} className="feasibility-item"><span>•</span><span>{w}</span></div>
              ))}
              <div style={{fontSize:'10px',color:'var(--accent-amber)',marginTop:'6px'}}>The lock will be saved but flagged. ETD impact will be reflected after optimization.</div>
            </div>
          )}

          <div style={{fontFamily:'var(--mono)',fontSize:'9px',color:'var(--text-muted)',letterSpacing:'0.8px',textTransform:'uppercase',marginBottom:'8px'}}>
            Select Operator ({scoredOps.filter(o=>o.feasible).length} feasible · {scoredOps.filter(o=>!o.feasible).length} infeasible)
          </div>

          <div style={{maxHeight:'280px',overflowY:'auto',marginBottom:'12px'}}>
            {scoredOps.map(op => (
              <div
                key={op.id}
                className={`assign-modal-operator ${selectedOpId===op.id?'selected':''} ${!op.feasible?'infeasible':''}`}
                onClick={() => { if (op.feasible || true) setSelectedOpId(op.id); }}
              >
                <div className={`op-avatar ${selectedOpId===op.id?'locked':''}`}>
                  {op.name.split(' ').map(n=>n[0]).join('').slice(0,2)}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:'6px',marginBottom:'2px'}}>
                    <span style={{fontSize:'12px',fontWeight:500}}>{op.name}</span>
                    <span className={`badge ${op.shift==='A'?'badge-blue':'badge-purple'}`} style={{fontSize:'9px'}}>Shift {op.shift}</span>
                    {!op.available && <span className="badge badge-red" style={{fontSize:'9px'}}>{op.leaveReason||'Unavailable'}</span>}
                    {op.feasible && op.available && <span className="badge badge-green" style={{fontSize:'9px'}}>Qualified</span>}
                  </div>
                  <div style={{fontSize:'10px',color:'var(--text-muted)'}}>{op.skills.join(' · ')}</div>
                  {op.warnings.length > 0 && (
                    <div style={{fontSize:'10px',color:'var(--accent-red)',marginTop:'2px'}}>
                      ⚠ {op.warnings.join(' | ')}
                    </div>
                  )}
                </div>
                {selectedOpId === op.id && (
                  <span style={{color:'#0ea5e9',fontSize:'16px'}}>🔒</span>
                )}
              </div>
            ))}
          </div>

          <div className="form-row" style={{marginBottom:0}}>
            <label className="form-label">Lock Note (optional)</label>
            <textarea className="reason-textarea" style={{minHeight:'48px'}}
              placeholder="e.g. Customer requested — only Rakesh Sharma for this job."
              value={note} onChange={e => setNote(e.target.value)} />
          </div>
        </div>

        <div className="modal-footer">
          {existingLock && (
            <button className="btn btn-secondary" style={{marginRight:'auto',color:'var(--accent-red)',borderColor:'var(--accent-red)44'}}
              onClick={() => onSave(null)}>
              🔓 Unlock
            </button>
          )}
          <button className="btn btn-secondary" onClick={onCancel}>Cancel</button>
          <button className="btn btn-primary" onClick={handleSave} disabled={!canSave}
            style={{background: canSave ? '#0ea5e9' : undefined}}>
            {canSave ? '🔒 Lock Assignment' : 'Select Operator'}
          </button>
        </div>
      </div>
    </div>
  );
}

function OrderDetailDrawer({ order, override, onClose, lockedAssignments, onLockSave, onOptimize }) {
  const [assignTarget, setAssignTarget] = useState(null); // { stage, stageData }
  if (!order) return null;

  const orderLocks = Object.entries(lockedAssignments||{})
    .filter(([k]) => k.startsWith(order.poNum + '::'))
    .map(([k, v]) => ({ key:k, stage: k.split('::')[1], ...v }));

  const infeasibleLocks = orderLocks.filter(l => l.infeasible || (l.warnings&&l.warnings.length>0));

  return (
    <>
      {assignTarget && (
        <ResourceAssignModal
          order={order}
          stage={assignTarget.stage}
          stageData={assignTarget.stageData}
          existingLock={lockedAssignments?.[`${order.poNum}::${assignTarget.stage}`] || null}
          onSave={lockData => {
            onLockSave(`${order.poNum}::${assignTarget.stage}`, lockData);
            setAssignTarget(null);
            setTimeout(() => onOptimize && onOptimize(), 300);
          }}
          onCancel={() => setAssignTarget(null)}
        />
      )}
      <div className="drawer-overlay" onClick={onClose}></div>
      <div className="drawer">
        <div className="drawer-header">
          <div>
            <div style={{fontFamily:'var(--mono)',fontSize:'14px',fontWeight:600,display:'flex',alignItems:'center',gap:'8px'}}>
              {order.poNum}
              {order.isOverridden && <span className="override-tag">✎ OVERRIDDEN</span>}
            </div>
            <div style={{fontSize:'11px',color:'var(--text-muted)'}}>{order.soNum} · {order.customer?.name}</div>
          </div>
          <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
            <StatusBadge status={order.status} />
            <div className="drawer-close" onClick={onClose}>✕</div>
          </div>
        </div>
        <div className="drawer-body">
          {override && (
            <div style={{background:'var(--accent-amber-dim)',border:'1px solid var(--accent-amber)44',borderRadius:'5px',padding:'10px 12px',marginBottom:'14px'}}>
              <div style={{fontFamily:'var(--mono)',fontSize:'9px',color:'var(--accent-amber)',letterSpacing:'0.8px',textTransform:'uppercase',marginBottom:'6px'}}>Manual Override Active · {override.overriddenAt} · {override.overriddenBy}</div>
              <div style={{fontSize:'11px',color:'var(--text-secondary)',marginBottom:'4px',fontStyle:'italic'}}>{override.reason}</div>
              <div style={{display:'flex',gap:'12px',marginTop:'6px',flexWrap:'wrap'}}>
                {override.priority !== override.origPriority && (
                  <div style={{fontSize:'11px'}}>Priority: <span style={{color:'var(--text-muted)',textDecoration:'line-through'}}>{override.origPriority}</span> → <span style={{color:'var(--accent-amber)',fontWeight:600}}>{override.priority}</span></div>
                )}
                {override.dueDate !== override.origDueDate && (
                  <div style={{fontSize:'11px',fontFamily:'var(--mono)'}}>Due: <span style={{color:'var(--text-muted)',textDecoration:'line-through'}}>{override.origDueDate}</span> → <span style={{color:'var(--accent-amber)',fontWeight:600}}>{override.dueDate}</span></div>
                )}
                {override.complexity !== override.origComplexity && (
                  <div style={{fontSize:'11px'}}>Complexity: <span style={{color:'var(--text-muted)',textDecoration:'line-through'}}>{override.origComplexity}</span> → <span style={{color:'var(--accent-amber)',fontWeight:600}}>{override.complexity}</span></div>
                )}
              </div>
            </div>
          )}
          <div className="drawer-section">
            <div className="drawer-section-title">Order Details</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
              {[
                { l:'Customer', v: order.customer?.name },
                { l:'Industry', v: order.customer?.industry },
                { l:'Part Type', v: order.partType },
                { l:'Weight', v: order.weight + ' kg' },
                { l:'Complexity', v: order.complexity },
                { l:'Priority', v: order.priority },
                { l:'Due Date', v: order.dueDate },
                { l:'ETA', v: order.eta },
                { l:'Delay', v: order.isDelayed ? `+${order.delayDays} days` : 'None' },
                { l:'Progress', v: order.progress + '%' },
              ].map(r => (
                <div key={r.l}>
                  <div style={{fontSize:'10px',color:'var(--text-muted)',fontFamily:'var(--mono)',marginBottom:'2px'}}>{r.l}</div>

                </div>
              ))}
            </div>
          </div>

          {order.delayReason && (
            <div className="drawer-section" style={{background:'var(--accent-red-dim)',border:'1px solid var(--accent-red)33',borderRadius:'5px',padding:'10px 12px'}}>
              <div className="drawer-section-title" style={{color:'var(--accent-red)',borderColor:'var(--accent-red)33'}}>Delay Reason</div>
              <div style={{fontSize:'12px',color:'var(--accent-red)'}}>{order.delayReason}</div>
            </div>
          )}

          {infeasibleLocks.length > 0 && (
            <div className="feasibility-warn" style={{marginBottom:'14px'}}>
              <div className="feasibility-warn-title">⚠ {infeasibleLocks.length} INFEASIBLE LOCK{infeasibleLocks.length>1?'S':''} — Review before optimization</div>
              {infeasibleLocks.map(l => (
                <div key={l.key} style={{marginBottom:'4px'}}>
                  <div style={{fontSize:'11px',color:'var(--accent-amber)',fontWeight:600}}>{l.stage}: {l.operatorName}</div>
                  {(l.warnings||[]).map((w,i) => (
                    <div key={i} className="feasibility-item"><span>•</span><span>{w}</span></div>
                  ))}
                </div>
              ))}
            </div>
          )}

          <div className="drawer-section">
            <div className="drawer-section-title" style={{display:'flex',justifyContent:'space-between'}}>
              <span>Routing Schedule</span>
              <span style={{fontFamily:'var(--mono)',fontSize:'9px',color:'#0ea5e9'}}>
                {orderLocks.length > 0 ? `${orderLocks.length} locked` : 'Click 🔒 to lock operator'}
              </span>
            </div>
            {STAGES.map((stage, idx) => {
              const stageData = order.stages?.find(s => s.stage === stage);
              const isDone = idx < order.currentStageIdx;
              const isActive = stage === order.currentStage;
              const op = stageData?.operator ? OPERATORS.find(o => o.id === stageData.operator) : null;
              const eq = stageData?.equipment ? EQUIPMENT.find(e => e.id === stageData.equipment) : null;
              const lockKey = `${order.poNum}::${stage}`;
              const lock = (lockedAssignments||{})[lockKey];
              const isLockedStage = !!lock;
              const isInfeasible = lock && (lock.infeasible || (lock.warnings && lock.warnings.length > 0));
              return (
                <div key={stage} className="routing-step" style={{
                  background: isLockedStage ? (isInfeasible ? 'rgba(248,81,73,0.05)' : 'rgba(14,165,233,0.04)') : 'transparent',
                  borderRadius: isLockedStage ? '4px' : 0,
                  padding: isLockedStage ? '4px 6px' : '0',
                  border: isLockedStage ? `1px solid ${isInfeasible ? 'rgba(248,81,73,0.3)' : 'rgba(14,165,233,0.25)'}` : 'none',
                  marginBottom: '4px',
                }}>
                  <div className={`step-num ${isDone ? 'done' : isActive ? 'active' : ''}`}
                    style={isLockedStage ? {borderColor: isInfeasible ? 'var(--accent-red)' : '#0ea5e9', color: isInfeasible ? 'var(--accent-red)' : '#0ea5e9'} : {}}>
                    {isDone ? '✓' : isLockedStage ? '🔒' : idx + 1}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{display:'flex',alignItems:'center',gap:'6px',flexWrap:'wrap'}}>
                      <span style={{fontSize:'12px',fontWeight: isActive||isLockedStage ? 600 : 400,
                        color: isInfeasible ? 'var(--accent-red)' : isLockedStage ? '#0ea5e9' : isActive ? 'var(--accent-blue)' : isDone ? 'var(--text-muted)' : 'var(--text-primary)'}}>
                        {stage}
                      </span>
                      {isActive && <span style={{fontSize:'10px',color:'var(--accent-blue)',fontFamily:'var(--mono)'}}>IN PROGRESS</span>}
                      {isLockedStage && !isInfeasible && <span className="lock-badge">🔒 {lock.operatorName}</span>}
                      {isInfeasible && <span className="infeasible-badge">⚠ INFEASIBLE</span>}
                    </div>
                    {stageData && (
                      <div style={{fontSize:'10px',color:'var(--text-muted)',fontFamily:'var(--mono)',marginTop:'2px'}}>
                        {stageData.plannedStart} → {stageData.plannedEnd}
                        {eq && <span style={{marginLeft:'8px'}}>· {eq.id}</span>}
                        {op && !isLockedStage && <span style={{marginLeft:'8px'}}>· {op.name.split(' ')[0]}</span>}
                        {isLockedStage && <span style={{marginLeft:'8px',color:'#0ea5e9'}}>· {lock.operatorName} (locked)</span>}
                        {stageData.hasShiftGap && <span style={{marginLeft:'8px',color:'var(--accent-red)'}}>· ⚠{stageData.gapShifts} gap shifts</span>}
                      </div>
                    )}
                    {isInfeasible && (lock.warnings||[]).map((w,i) => (
                      <div key={i} style={{fontSize:'10px',color:'var(--accent-red)',marginTop:'2px'}}>⚠ {w}</div>
                    ))}
                  </div>
                  <button className="edit-btn" style={{
                    fontSize:'10px', padding:'2px 7px', flexShrink:0,
                    background: isLockedStage ? '#0ea5e918' : undefined,
                    borderColor: isLockedStage ? '#0ea5e966' : undefined,
                    color: isLockedStage ? '#0ea5e9' : undefined,
                  }}
                    onClick={() => setAssignTarget({ stage, stageData })}>
                    {isLockedStage ? '🔒 Edit' : '🔒 Lock'}
                  </button>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </>
  );
}

// ============================================================
// ORDERS SCREEN
// ============================================================
function OrdersScreen({ orders, overrides, onOverrideSave, onOptimize, lockedAssignments, onLockSave }) {
  const [selected, setSelected] = useState(null);
  const [editOrder, setEditOrder] = useState(null);
  const [filterStatus, setFilterStatus] = useState('All');
  const [filterPriority, setFilterPriority] = useState('All');
  const [filterIndustry, setFilterIndustry] = useState('All');

  const filtered = orders.filter(o => {
    if (filterStatus !== 'All' && o.status !== filterStatus) return false;
    if (filterPriority !== 'All' && o.priority !== filterPriority) return false;
    if (filterIndustry !== 'All' && o.customer?.industry !== filterIndustry) return false;
    return true;
  });

  const overrideCount = Object.keys(overrides).length;

  function handleSave(overrideData) {
    if (overrideData === null) {
      // Clear override
      onOverrideSave(editOrder.poNum, null);
    } else {
      onOverrideSave(overrideData.poNum, overrideData);
    }
    setEditOrder(null);
    // Trigger re-optimize automatically after a short delay
    setTimeout(() => onOptimize(), 300);
  }

  return (
    <div className="fade-in">
      {overrideCount > 0 && (
        <div className="overrides-banner">
          <span style={{color:'var(--accent-amber)',fontWeight:600}}>✎</span>
          <span style={{color:'var(--accent-amber)',fontFamily:'var(--mono)',fontSize:'11px',fontWeight:600}}>{overrideCount} manual override{overrideCount > 1 ? 's' : ''} active</span>
          <span style={{color:'var(--text-muted)',fontSize:'11px'}}>— schedule will use overridden values on next optimization run</span>
          <button className="btn btn-sm btn-secondary" style={{marginLeft:'auto',fontSize:'10px'}} onClick={() => onOptimize()}>Rerun with Overrides</button>
        </div>
      )}
      {Object.keys(lockedAssignments||{}).length > 0 && (
        <div className="locked-summary-bar">
          <span style={{color:'#0ea5e9',fontSize:'14px'}}>🔒</span>
          <span style={{color:'#0ea5e9',fontFamily:'var(--mono)',fontSize:'11px',fontWeight:600}}>
            {Object.keys(lockedAssignments).length} operator lock{Object.keys(lockedAssignments).length>1?'s':''} active
          </span>
          {Object.values(lockedAssignments).filter(l=>l&&(l.infeasible||(l.warnings&&l.warnings.length>0))).length > 0 && (
            <span className="infeasible-badge" style={{marginLeft:'4px'}}>
              ⚠ {Object.values(lockedAssignments).filter(l=>l&&(l.infeasible||(l.warnings&&l.warnings.length>0))).length} infeasible
            </span>
          )}
          <span style={{color:'var(--text-muted)',fontSize:'11px'}}>— optimizer will treat these as hard constraints</span>
          <button className="btn btn-sm btn-secondary" style={{marginLeft:'auto',fontSize:'10px'}} onClick={() => onOptimize()}>Rerun with Locks</button>
        </div>
      )}

      <div className="filter-bar">
        <select className="filter-select" value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
          {['All','On Track','At Risk','Delayed'].map(s => <option key={s}>{s}</option>)}
        </select>
        <select className="filter-select" value={filterPriority} onChange={e => setFilterPriority(e.target.value)}>
          {['All','Critical','High','Medium','Low'].map(p => <option key={p}>{p}</option>)}
        </select>
        <select className="filter-select" value={filterIndustry} onChange={e => setFilterIndustry(e.target.value)}>
          {['All','Automotive','Aerospace'].map(i => <option key={i}>{i}</option>)}
        </select>
        <span style={{fontFamily:'var(--mono)',fontSize:'10px',color:'var(--text-muted)',display:'flex',alignItems:'center',marginLeft:'auto'}}>
          {filtered.length} / {orders.length} orders
        </span>
      </div>

      <div className="card">
        <div className="table-scroll">
          <table className="data-table">
            <thead>
              <tr>
                <th>Sales Order</th>
                <th>Prod. Order</th>
                <th>Customer</th>
                <th>Industry</th>
                <th>Priority</th>
                <th>Current Stage</th>
                <th>Due Date</th>
                <th>ETA</th>
                <th>Status</th>
                <th>Progress</th>
                <th>Override</th>
                <th>Locks</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(order => {
                const ov = overrides[order.poNum];
                return (
                  <tr key={order.poNum} className="clickable" onClick={() => setSelected(order)}
                    style={{background: ov ? 'rgba(210,153,34,0.04)' : undefined}}>
                    <td className="mono" style={{color:'var(--accent-blue)',fontSize:'11px'}}>{order.soNum}</td>
                    <td className="mono" style={{fontSize:'11px'}}>{order.poNum}</td>
                    <td style={{fontSize:'12px'}}>{order.customer?.name}</td>
                    <td>
                      <span className={`badge ${order.customer?.industry === 'Aerospace' ? 'badge-purple' : 'badge-blue'}`}>
                        {order.customer?.industry}
                      </span>
                    </td>
                    <td>
                      <div style={{display:'flex',alignItems:'center',gap:'5px'}}>
                        <PriorityBadge priority={order.priority} />
                        {ov && ov.priority !== ov.origPriority && (
                          <span style={{fontFamily:'var(--mono)',fontSize:'9px',color:'var(--accent-amber)'}}>
                            ↑{ov.origPriority[0]}→{ov.priority[0]}
                          </span>
                        )}
                      </div>
                    </td>
                    <td style={{fontSize:'11px'}}>{order.currentStage || '—'}</td>
                    <td className="mono" style={{fontSize:'11px'}}>
                      {order.dueDate}
                      {ov && ov.dueDate !== ov.origDueDate && (
                        <span style={{display:'block',fontSize:'9px',color:'var(--accent-amber)'}}>{ov.origDueDate}→{ov.dueDate}</span>
                      )}
                    </td>
                    <td className="mono" style={{fontSize:'11px',color: order.isDelayed ? 'var(--accent-red)' : order.isAtRisk ? 'var(--accent-amber)' : 'var(--text-secondary)'}}>
                      {order.eta || '—'}
                      {order.isDelayed && <span style={{fontSize:'10px',marginLeft:'4px'}}>+{order.delayDays}d</span>}
                    </td>
                    <td><StatusBadge status={order.status || 'Unscheduled'} /></td>
                    <td>
                      <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
                        <div className="progress-bar" style={{width:'60px'}}>
                          <div className="progress-fill" style={{
                            width: `${order.progress || 0}%`,
                            background: order.isDelayed ? 'var(--accent-red)' : 'var(--accent-blue)'
                          }}></div>
                        </div>
                        <span className="mono" style={{fontSize:'10px',color:'var(--text-muted)'}}>{order.progress || 0}%</span>
                      </div>
                    </td>
                    <td onClick={e => { e.stopPropagation(); setEditOrder(order); }}>
                      <div className={`edit-btn ${ov ? 'overridden' : ''}`}>
                        {ov ? '✎ Edited' : '✎ Edit'}
                      </div>
                    </td>
                    <td onClick={e => { e.stopPropagation(); setSelected(order); }}>
                      {(() => {
                        const orderLockCount = Object.keys(lockedAssignments||{}).filter(k=>k.startsWith(order.poNum+'::')).length;
                        const orderInfeasible = Object.entries(lockedAssignments||{}).filter(([k,v])=>k.startsWith(order.poNum+'::')&&v&&(v.infeasible||(v.warnings&&v.warnings.length>0))).length;
                        if (orderLockCount === 0) return <span style={{color:'var(--text-muted)',fontSize:'11px'}}>—</span>;
                        return (
                          <div style={{display:'flex',gap:'4px',alignItems:'center'}}>
                            <span className="lock-badge">🔒 {orderLockCount}</span>
                            {orderInfeasible > 0 && <span className="infeasible-badge">⚠</span>}
                          </div>
                        );
                      })()}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {selected && <OrderDetailDrawer order={selected} override={overrides[selected.poNum]} onClose={() => setSelected(null)} lockedAssignments={lockedAssignments} onLockSave={onLockSave} onOptimize={onOptimize} />}

      {editOrder && (
        <OrderOverrideModal
          order={editOrder}
          existingOverride={overrides[editOrder.poNum] || null}
          onSave={handleSave}
          onCancel={() => setEditOrder(null)}
        />
      )}
    </div>
  );
}

// PLANNER CHATBOT
// ============================================================
function PlannerChatbot({ orders, utilization, setScreen }) {
  const [open, setOpen] = useState(false);
  const [messages, setMessages] = useState([
    { role:'bot', text:'Hello! I\'m your SecondBrains planning assistant. I can answer questions about your production schedule, equipment, operators, and order status.', data:null }
  ]);
  const [input, setInput] = useState('');
  const [typing, setTyping] = useState(false);
  const messagesRef = useRef(null);

  const chips = [
    'Show delayed orders',
    'Check ETA for PO-1003',
    'Show shift gaps',
    'Who is unavailable today?',
    "Today's bottleneck?",
    'Equipment overload?',
    'Orders at risk?',
    'Show ETD summary',
    'Show locked assignments',
  ];

  useEffect(() => {
    if (messagesRef.current) {
      messagesRef.current.scrollTop = messagesRef.current.scrollHeight;
    }
  }, [messages]);

  function sendMsg(text) {
    if (!text.trim()) return;
    const userMsg = { role:'user', text, data:null };
    setMessages(prev => [...prev, userMsg]);
    setInput('');
    setTyping(true);

    setTimeout(() => {
      const response = chatbotService.respond(text, orders, utilization);
      setMessages(prev => [...prev, { role:'bot', ...response }]);
      setTyping(false);
      if (response.screen) {
        // Could navigate, but just highlight
      }
    }, 600 + Math.random() * 400);
  }

  return (
    <>
      <div className="chatbot-fab" onClick={() => setOpen(o => !o)}>
        <span style={{fontSize:'18px'}}>{open ? '✕' : '💬'}</span>
      </div>

      {open && (
        <div className="chatbot-window">
          <div className="chat-header">
            <div className="chat-avatar">🤖</div>
            <div>
              <div style={{fontSize:'13px',fontWeight:600}}>Planning Assistant</div>
              <div style={{fontSize:'10px',color:'var(--text-muted)',fontFamily:'var(--mono)'}}>SecondBrains AI · {orders.length} orders loaded</div>
            </div>
            <div className="pulse-dot" style={{marginLeft:'auto'}}></div>
          </div>

          <div className="chat-messages" ref={messagesRef}>
            {messages.map((msg, i) => (
              <div key={i} className={`chat-msg ${msg.role}`}>
                <div className={`chat-bubble ${msg.role}`}>
                  <div>{msg.text}</div>
                  {msg.data && (
                    <div style={{marginTop:'8px',fontFamily:'var(--mono)',fontSize:'10px',color: msg.role === 'user' ? 'rgba(255,255,255,0.8)' : 'var(--text-muted)',whiteSpace:'pre-line',borderTop:'1px solid var(--border)',paddingTop:'6px'}}>
                      {msg.data}
                    </div>
                  )}
                  {msg.screen && (
                    <button
                      className="btn btn-sm btn-secondary"
                      style={{marginTop:'6px',fontSize:'10px'}}
                      onClick={() => setScreen(msg.screen)}
                    >
                      View →
                    </button>
                  )}
                </div>
              </div>
            ))}
            {typing && (
              <div className="chat-msg bot">
                <div className="chat-bubble bot" style={{color:'var(--text-muted)',fontFamily:'var(--mono)',fontSize:'11px'}}>
                  ···
                </div>
              </div>
            )}
          </div>

          <div className="chat-chips">
            {chips.map(c => (
              <div key={c} className="chat-chip" onClick={() => sendMsg(c)}>{c}</div>
            ))}
          </div>

          <div className="chat-input-row">
            <input
              className="chat-input"
              placeholder="Ask about orders, equipment, operators…"
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && sendMsg(input)}
            />
            <button className="btn btn-primary btn-sm" onClick={() => sendMsg(input)}>→</button>
          </div>
        </div>
      )}
    </>
  );
}

// MAIN APP
// ============================================================
function App({ user, onLogout }) {
  const [screen, setScreen] = useState('dashboard');
  const [orders, setOrders] = useState([]);
  const [utilization, setUtilization] = useState({});
  const [summary, setSummary] = useState(null);
  const [optimizing, setOptimizing] = useState(false);
  const [optimized, setOptimized] = useState(false);
  // overrides: { [poNum]: { priority, dueDate, complexity, reason, origPriority, origDueDate, origComplexity, ... } | null }
  const [overrides, setOverrides] = useState({});
  // lockedAssignments: { "PO-1001::Rough Machining": { operatorId, operatorName, note, lockedBy, lockedAt, infeasible, warnings } }
  const [lockedAssignments, setLockedAssignments] = useState({});

  const sapStatus = sapMockService.getStatus();
  const otStatus = otMockService.getStatus();
  const hrmsStatus = hrmsMockService.getStatus();

  // Load initial unscheduled orders
  useEffect(() => {
    const initial = RAW_ORDERS.map(o => {
      const cust = CUSTOMERS.find(c => c.id === o.custId);
      return { ...o, customer: cust, status: 'Unscheduled', currentStage: null, progress: 0, eta: null, isDelayed: false, isAtRisk: false };
    });
    setOrders(initial);
  }, []);

  function handleOverrideSave(poNum, overrideData) {
    setOverrides(prev => {
      const next = { ...prev };
      if (overrideData === null) {
        delete next[poNum];
      } else {
        next[poNum] = overrideData;
      }
      return next;
    });
  }

  function handleLockSave(lockKey, lockData) {
    setLockedAssignments(prev => {
      const next = { ...prev };
      if (lockData === null) {
        delete next[lockKey];
      } else {
        next[lockKey] = lockData;
      }
      return next;
    });
  }

  function handleOptimize(extraOverrides) {
    const activeOverrides = extraOverrides || overrides;
    setOptimizing(true);
    setTimeout(() => {
      // Merge overrides into raw orders before feeding to optimizer
      const mergedOrders = RAW_ORDERS.map(o => {
        const ov = activeOverrides[o.poNum];
        if (!ov) return o;
        return { ...o, priority: ov.priority, dueDate: ov.dueDate, complexity: ov.complexity };
      });
      const result = planningOptimizer.run(mergedOrders, lockedAssignments);
      // Tag overridden orders so the UI can show the indicator
      const taggedOrders = result.orders.map(o => ({
        ...o,
        isOverridden: !!activeOverrides[o.poNum],
        override: activeOverrides[o.poNum] || null,
      }));
      setOrders(taggedOrders);
      setUtilization(result.utilization);
      setSummary({
        ...result.summary,
        overridesApplied: Object.keys(activeOverrides).length,
        lockedAssignmentsApplied: Object.keys(lockedAssignments).length,
      });
      setOptimizing(false);
      setOptimized(true);
    }, 2200);
  }

  const screenComponents = {
    dashboard: <DashboardScreen orders={orders} utilization={utilization} summary={summary} sapStatus={sapStatus} hrmsStatus={hrmsStatus} otStatus={otStatus} setScreen={setScreen} />,
    planning: <PlanningBoard orders={orders} utilization={utilization} />,
    orders: <OrdersScreen orders={orders} overrides={overrides} onOverrideSave={handleOverrideSave} onOptimize={handleOptimize} lockedAssignments={lockedAssignments} onLockSave={handleLockSave} />,
    equipment: <EquipmentScreen utilization={utilization} />,
    resources: <ResourcesScreen />,
    integrations: <IntegrationsScreen sapStatus={sapStatus} hrmsStatus={hrmsStatus} otStatus={otStatus} />,
  };

  const pageTitles = {
    dashboard: 'Production Command Center',
    planning: 'Planning Board — Gantt View',
    orders: 'Production Orders',
    equipment: 'Equipment Master',
    resources: 'Resource Management',
    integrations: 'Integration Status',
  };

  return (
    <div className="app-shell">
      <Sidebar activeScreen={screen} setScreen={setScreen} />
      <div className="main-area">
        <TopCommandBar
          screen={screen}
          optimized={optimized}
          onOptimize={handleOptimize}
          optimizing={optimizing}
          overridesCount={Object.keys(overrides).length}
          locksCount={Object.keys(lockedAssignments).length}
          user={user}
          onLogout={onLogout}
        />

        {/* Page title bar */}
        <div style={{
          padding:'8px 16px',
          borderBottom:'1px solid var(--border)',
          display:'flex',
          alignItems:'center',
          justifyContent:'space-between',
          background:'var(--bg-surface)',
          flexShrink:0,
        }}>
          <div style={{fontFamily:'var(--mono)',fontSize:'11px',color:'var(--text-secondary)',letterSpacing:'0.5px'}}>
            {pageTitles[screen]}
          </div>
          <div style={{display:'flex',gap:'10px',alignItems:'center'}}>
            <span style={{fontFamily:'var(--mono)',fontSize:'10px',color:'var(--text-muted)'}}>
              SAP: {sapStatus.ordersImported} orders · HRMS: {hrmsStatus.available}/{hrmsStatus.totalOperators} available · OT: {otStatus.recentEvents.length} events
            </span>
          </div>
        </div>

        <div className="page-content">
          {optimizing && (
            <div style={{marginBottom:'14px',background:'var(--accent-purple-dim)',border:'1px solid var(--accent-purple)44',borderRadius:'6px',padding:'12px 16px',display:'flex',alignItems:'center',gap:'12px'}}>
              <div className="loading-text" style={{fontSize:'13px'}}>Running constraint solver…</div>
              <div style={{fontSize:'11px',color:'var(--text-muted)'}}>Processing {RAW_ORDERS.length} orders × {STAGES.length} stages — checking equipment, operators, maintenance windows…</div>
            </div>
          )}
          {screenComponents[screen]}
        </div>
      </div>

      <PlannerChatbot orders={orders} utilization={utilization} setScreen={setScreen} />
    </div>
  );
}

const DEMO_USERS = [
  { username:'planner', password:'demo123', role:'Production Planner', name:'Demo Planner' },
  { username:'manager', password:'demo123', role:'Operations Manager', name:'Demo Manager' },
  { username:'admin',   password:'demo123', role:'System Administrator', name:'Admin User' },
];

function LoginPage({ onLogin }) {
  const [username, setUsername] = React.useState('');
  const [password, setPassword] = React.useState('');
  const [error, setError] = React.useState('');
  const [loading, setLoading] = React.useState(false);

  function handleLogin() {
    if (!username || !password) { setError('Please enter username and password.'); return; }
    setLoading(true);
    setError('');
    setTimeout(() => {
      const user = DEMO_USERS.find(u => u.username === username.toLowerCase().trim() && u.password === password);
      if (user) {
        onLogin(user);
      } else {
        setError('Invalid credentials. Use planner / demo123');
        setLoading(false);
      }
    }, 800);
  }

  return (
    <div className="login-root">
      <div className="login-card">
        <div className="login-logo-wrap">
          <img src={LOGO_SRC} className="login-logo-img" alt="SecondBrains" />
        </div>
        <div className="login-title">AI Production Planning & Scheduling</div>
        {error && <div className="login-error">{error}</div>}
        <div className="login-field">
          <label className="login-label">Username</label>
          <input className="login-input" placeholder="planner / manager / admin"
            value={username} onChange={e => setUsername(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && handleLogin()} autoFocus />
        </div>
        <div className="login-field">
          <label className="login-label">Password</label>
          <input className="login-input" type="password" placeholder="demo123"
            value={password} onChange={e => setPassword(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && handleLogin()} />
        </div>
        <button className="login-btn" onClick={handleLogin} disabled={loading}>
          {loading ? 'Signing in…' : 'Sign In'}
        </button>
        <div className="login-divider" />
        <div className="login-hint">
          Demo credentials: planner / demo123 &nbsp;|&nbsp; manager / demo123
        </div>
        <div className="login-footer">
          © {new Date().getFullYear()} SecondBrains. All rights reserved.
        </div>
      </div>
    </div>
  );
}

// ─── Root: Login gate + App ───────────────────────────────────────────────
function Root() {
  const [user, setUser] = React.useState(null);
  if (!user) return <LoginPage onLogin={setUser} />;
  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh'}}>
      <AppWithUser user={user} onLogout={() => setUser(null)} />
      <div className="app-footer">
        <span className="app-footer-text">
          © {new Date().getFullYear()} SecondBrains — The Art of Intelligence &nbsp;|&nbsp; AI Production Planning &nbsp;|&nbsp; Signed in as <strong style={{color:'var(--text-secondary)'}}>{user.name}</strong> ({user.role})
        </span>
      </div>
    </div>
  );
}

// Rename App to AppWithUser and accept user props
function AppWithUser({ user, onLogout }) {
  return <App user={user} onLogout={onLogout} />;
}

ReactDOM.render(<Root />, document.getElementById('root'));
</script>
