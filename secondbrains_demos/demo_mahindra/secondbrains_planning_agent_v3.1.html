<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SecondBrains — AI Production Planning</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base: #0a0c10;
    --bg-surface: #0f1318;
    --bg-elevated: #161b22;
    --bg-hover: #1c2330;
    --border: #21262d;
    --border-accent: #30363d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-muted: #484f58;
    --accent-blue: #1f6feb;
    --accent-blue-dim: #1f6feb22;
    --accent-green: #3fb950;
    --accent-green-dim: #3fb95018;
    --accent-amber: #d29922;
    --accent-amber-dim: #d2992218;
    --accent-red: #f85149;
    --accent-red-dim: #f8514918;
    --accent-purple: #7c3aed;
    --accent-purple-dim: #7c3aed22;
    --accent-teal: #0ea5e9;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg-base); color: var(--text-primary); font-family: var(--sans); font-size: 13px; overflow: hidden; height: 100vh; }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-accent); border-radius: 2px; }

  .app-shell { display: flex; height: 100vh; }

  /* SIDEBAR */
  .sidebar { width: 52px; background: var(--bg-surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 12px 0; z-index: 100; flex-shrink: 0; }
  .sidebar-logo { width: 36px; height: 36px; border-radius: 6px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; cursor: pointer; overflow:hidden; }
  .sidebar-nav { display: flex; flex-direction: column; gap: 2px; flex: 1; width: 100%; padding: 0 6px; }
  .nav-item { width: 40px; height: 40px; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-muted); transition: all 0.15s; position: relative; }
  .nav-item:hover { background: var(--bg-hover); color: var(--text-secondary); }
  .nav-item.active { background: var(--accent-blue-dim); color: var(--accent-blue); }
  .nav-item svg { width: 16px; height: 16px; }
  .nav-separator { height: 1px; background: var(--border); margin: 6px 8px; }

  /* TOP BAR */
  .top-bar { height: 44px; background: var(--bg-surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; }
  .top-bar-title { font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--text-secondary); letter-spacing: 0.5px; text-transform: uppercase; }
  .top-bar-breadcrumb { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 11px; color: var(--text-muted); }
  .top-bar-breadcrumb span { color: var(--text-primary); }
  .top-bar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .sync-badge { font-family: var(--mono); font-size: 10px; color: var(--accent-green); background: var(--accent-green-dim); padding: 2px 8px; border-radius: 3px; border: 1px solid var(--accent-green)33; }
  .pulse-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* MAIN CONTENT */
  .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .page-content { flex: 1; overflow-y: auto; padding: 16px; }

  /* BUTTONS */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 5px; font-size: 12px; font-family: var(--sans); font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-primary { background: var(--accent-blue); color: #fff; }
  .btn-primary:hover { background: #388bfd; }
  .btn-secondary { background: var(--bg-elevated); color: var(--text-primary); border: 1px solid var(--border-accent); }
  .btn-secondary:hover { background: var(--bg-hover); }
  .btn-purple { background: var(--accent-purple); color: #fff; }
  .btn-purple:hover { background: #6d28d9; }
  .btn-sm { padding: 4px 10px; font-size: 11px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* CARDS */
  .card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 6px; }
  .card-header { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .card-title { font-family: var(--mono); font-size: 10px; font-weight: 500; color: var(--text-secondary); letter-spacing: 0.8px; text-transform: uppercase; }
  .card-body { padding: 14px; }

  /* METRIC CARDS */
  .metric-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 14px; }
  .metric-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; }
  .metric-label { font-family: var(--mono); font-size: 9px; color: var(--text-muted); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 6px; }
  .metric-value { font-family: var(--mono); font-size: 22px; font-weight: 600; line-height: 1; }
  .metric-sub { font-family: var(--mono); font-size: 10px; color: var(--text-muted); margin-top: 4px; }
  .metric-trend { font-size: 10px; margin-top: 4px; }
  .metric-card.red { border-color: var(--accent-red)44; }
  .metric-card.red .metric-value { color: var(--accent-red); }
  .metric-card.green { border-color: var(--accent-green)44; }
  .metric-card.green .metric-value { color: var(--accent-green); }
  .metric-card.amber { border-color: var(--accent-amber)44; }
  .metric-card.amber .metric-value { color: var(--accent-amber); }
  .metric-card.blue { border-color: var(--accent-blue)44; }
  .metric-card.blue .metric-value { color: var(--accent-blue); }
  .metric-card.purple { border-color: var(--accent-purple)44; }
  .metric-card.purple .metric-value { color: var(--accent-purple); }

  /* BADGES */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 7px; border-radius: 3px; font-family: var(--mono); font-size: 10px; font-weight: 500; }
  .badge-green { background: var(--accent-green-dim); color: var(--accent-green); border: 1px solid var(--accent-green)33; }
  .badge-red { background: var(--accent-red-dim); color: var(--accent-red); border: 1px solid var(--accent-red)33; }
  .badge-amber { background: var(--accent-amber-dim); color: var(--accent-amber); border: 1px solid var(--accent-amber)33; }
  .badge-blue { background: var(--accent-blue-dim); color: var(--accent-blue); border: 1px solid var(--accent-blue)33; }
  .badge-purple { background: var(--accent-purple-dim); color: var(--accent-purple); border: 1px solid var(--accent-purple)44; }
  .badge-grey { background: #1c2330; color: var(--text-secondary); border: 1px solid var(--border-accent); }
  .badge-dot { width: 5px; height: 5px; border-radius: 50%; }
  .badge-dot-green { background: var(--accent-green); }
  .badge-dot-red { background: var(--accent-red); }
  .badge-dot-amber { background: var(--accent-amber); }
  .badge-dot-blue { background: var(--accent-blue); }
  .badge-dot-grey { background: var(--text-muted); }

  /* TABLES */
  .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .data-table th { padding: 8px 12px; text-align: left; font-family: var(--mono); font-size: 9px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.8px; text-transform: uppercase; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .data-table td { padding: 9px 12px; border-bottom: 1px solid var(--border)88; vertical-align: middle; }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: var(--bg-hover); }
  .data-table tr.clickable { cursor: pointer; }
  .mono { font-family: var(--mono); }

  /* PROGRESS BAR */
  .progress-bar { height: 4px; background: var(--bg-elevated); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }

  /* GANTT */
  .gantt-container { overflow-x: auto; overflow-y: auto; }
  .gantt-row { display: flex; align-items: center; border-bottom: 1px solid var(--border)55; min-height: 36px; }
  .gantt-label { width: 200px; flex-shrink: 0; padding: 4px 12px; font-family: var(--mono); font-size: 11px; border-right: 1px solid var(--border); }
  .gantt-timeline { flex: 1; position: relative; height: 36px; }
  .gantt-bar { position: absolute; height: 20px; top: 8px; border-radius: 3px; display: flex; align-items: center; padding: 0 6px; font-family: var(--mono); font-size: 9px; white-space: nowrap; overflow: hidden; transition: all 0.3s ease; }
  .gantt-header { display: flex; border-bottom: 1px solid var(--border); background: var(--bg-surface); }
  .gantt-header-label { width: 200px; flex-shrink: 0; padding: 6px 12px; font-family: var(--mono); font-size: 9px; color: var(--text-muted); border-right: 1px solid var(--border); }
  .gantt-header-dates { flex: 1; display: flex; }
  .gantt-date-mark { font-family: var(--mono); font-size: 9px; color: var(--text-muted); padding: 6px 4px; border-right: 1px solid var(--border)44; }

  /* CHATBOT */
  .chatbot-fab { position: fixed; bottom: 20px; right: 20px; width: 44px; height: 44px; background: var(--accent-purple); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 20px var(--accent-purple)44; z-index: 1000; transition: all 0.2s; }
  .chatbot-fab:hover { transform: scale(1.08); }
  .chatbot-window { position: fixed; bottom: 72px; right: 20px; width: 380px; height: 520px; background: var(--bg-surface); border: 1px solid var(--border-accent); border-radius: 10px; display: flex; flex-direction: column; z-index: 1000; box-shadow: 0 8px 40px #00000066; overflow: hidden; }
  .chat-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: var(--bg-elevated); }
  .chat-avatar { width: 28px; height: 28px; background: var(--accent-purple); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .chat-msg { max-width: 88%; }
  .chat-msg.user { align-self: flex-end; }
  .chat-msg.bot { align-self: flex-start; }
  .chat-bubble { padding: 8px 12px; border-radius: 8px; font-size: 12px; line-height: 1.5; }
  .chat-bubble.user { background: var(--accent-blue); color: #fff; }
  .chat-bubble.bot { background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-primary); }
  .chat-chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 12px; border-top: 1px solid var(--border); }
  .chat-chip { padding: 4px 10px; background: var(--bg-elevated); border: 1px solid var(--border-accent); border-radius: 12px; font-size: 11px; cursor: pointer; color: var(--text-secondary); transition: all 0.15s; white-space: nowrap; }
  .chat-chip:hover { background: var(--accent-purple-dim); color: var(--accent-purple); border-color: var(--accent-purple)44; }
  .chat-input-row { display: flex; gap: 8px; padding: 10px 12px; border-top: 1px solid var(--border); }
  .chat-input { flex: 1; background: var(--bg-elevated); border: 1px solid var(--border-accent); border-radius: 6px; padding: 6px 10px; color: var(--text-primary); font-family: var(--sans); font-size: 12px; outline: none; }
  .chat-input:focus { border-color: var(--accent-purple)66; }
  .chat-input::placeholder { color: var(--text-muted); }

  /* SOLVER PANEL */
  .solver-panel { background: var(--accent-purple-dim); border: 1px solid var(--accent-purple)44; border-radius: 6px; padding: 14px; margin-bottom: 14px; animation: slideIn 0.3s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  .solver-title { font-family: var(--mono); font-size: 10px; color: var(--accent-purple); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .solver-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .solver-stat { text-align: center; }
  .solver-stat-val { font-family: var(--mono); font-size: 18px; font-weight: 600; color: var(--accent-purple); }
  .solver-stat-label { font-family: var(--mono); font-size: 9px; color: var(--text-muted); letter-spacing: 0.5px; margin-top: 2px; }

  /* DRAWER */
  .drawer-overlay { position: fixed; inset: 0; background: #00000066; z-index: 200; }
  .drawer { position: fixed; right: 0; top: 0; bottom: 0; width: 460px; background: var(--bg-surface); border-left: 1px solid var(--border-accent); z-index: 201; overflow-y: auto; display: flex; flex-direction: column; animation: drawerIn 0.2s ease; }
  @keyframes drawerIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .drawer-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .drawer-body { padding: 16px 20px; flex: 1; }
  .drawer-close { width: 28px; height: 28px; border-radius: 4px; background: var(--bg-elevated); border: 1px solid var(--border-accent); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); }
  .drawer-section { margin-bottom: 20px; }
  .drawer-section-title { font-family: var(--mono); font-size: 9px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

  /* ROUTING STEPS */
  .routing-step { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border)44; }
  .routing-step:last-child { border-bottom: none; }
  .step-num { width: 20px; height: 20px; border-radius: 50%; background: var(--bg-elevated); border: 1px solid var(--border-accent); display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 10px; color: var(--text-muted); flex-shrink: 0; }
  .step-num.active { background: var(--accent-blue-dim); border-color: var(--accent-blue)55; color: var(--accent-blue); }
  .step-num.done { background: var(--accent-green-dim); border-color: var(--accent-green)55; color: var(--accent-green); }

  /* LOADING OVERLAY */
  .loading-overlay { position: absolute; inset: 0; background: var(--bg-base)cc; display: flex; align-items: center; justify-content: center; z-index: 50; border-radius: 6px; }
  .loading-text { font-family: var(--mono); font-size: 12px; color: var(--accent-purple); animation: blink 1.2s infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* GRID LAYOUTS */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .grid-65-35 { display: grid; grid-template-columns: 65fr 35fr; gap: 12px; }

  /* FILTER BAR */
  .filter-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .filter-select { background: var(--bg-surface); border: 1px solid var(--border-accent); border-radius: 4px; padding: 5px 8px; color: var(--text-secondary); font-size: 11px; font-family: var(--sans); outline: none; cursor: pointer; }
  .filter-select:focus { border-color: var(--accent-blue)55; }

  /* INTEGRATION HEALTH */
  .integration-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 6px; padding: 14px; }
  .integration-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .integration-icon { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .integration-name { font-weight: 600; font-size: 13px; }
  .integration-status { font-family: var(--mono); font-size: 10px; color: var(--text-muted); }
  .integration-stat-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border)55; }
  .integration-stat-row:last-child { border-bottom: none; }
  .integration-stat-label { font-size: 11px; color: var(--text-secondary); }
  .integration-stat-val { font-family: var(--mono); font-size: 11px; color: var(--text-primary); }

  /* OT FEED */
  .ot-event { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border)44; }
  .ot-event:last-child { border-bottom: none; }
  .ot-event-time { font-family: var(--mono); font-size: 10px; color: var(--text-muted); width: 50px; flex-shrink: 0; padding-top: 1px; }
  .ot-event-content { flex: 1; }
  .ot-event-title { font-size: 12px; color: var(--text-primary); margin-bottom: 2px; }
  .ot-event-detail { font-family: var(--mono); font-size: 10px; color: var(--text-muted); }

  /* TABS */
  .tab-bar { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 14px; }
  .tab { padding: 8px 14px; font-size: 12px; cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
  .tab:hover { color: var(--text-secondary); }
  .tab.active { color: var(--accent-blue); border-bottom-color: var(--accent-blue); }

  /* UTILIZATION BAR */
  .util-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
  .util-label { width: 120px; font-size: 11px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .util-bar-wrap { flex: 1; height: 6px; background: var(--bg-elevated); border-radius: 3px; overflow: hidden; }
  .util-bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
  .util-pct { width: 36px; font-family: var(--mono); font-size: 10px; color: var(--text-secondary); text-align: right; }

  /* FLOW DIAGRAM */
  .flow-box { background: var(--bg-elevated); border: 1px solid var(--border-accent); border-radius: 6px; padding: 10px 14px; text-align: center; }
  .flow-arrow { color: var(--text-muted); font-size: 18px; display: flex; align-items: center; }
  .flow-row { display: flex; align-items: center; justify-content: center; gap: 12px; }

  /* SCROLLABLE TABLE CONTAINER */
  .table-scroll { overflow-x: auto; overflow-y: auto; max-height: 420px; }

  /* TOOLTIPS */
  .tooltip-wrap { position: relative; }
  .tooltip-wrap:hover .tooltip-content { display: block; }
  .tooltip-content { display: none; position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: var(--bg-elevated); border: 1px solid var(--border-accent); border-radius: 4px; padding: 5px 8px; font-family: var(--mono); font-size: 10px; white-space: nowrap; z-index: 100; color: var(--text-primary); box-shadow: 0 4px 12px #00000066; }

  /* ANIMATE IN */
  .fade-in { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* OVERRIDE MODAL */
  .modal-overlay { position: fixed; inset: 0; background: #00000088; z-index: 300; display: flex; align-items: center; justify-content: center; }
  .modal { background: var(--bg-surface); border: 1px solid var(--border-accent); border-radius: 8px; width: 480px; max-width: 96vw; box-shadow: 0 12px 48px #00000088; animation: modalIn 0.18s ease; overflow: hidden; }
  @keyframes modalIn { from { opacity: 0; transform: scale(0.96) translateY(-8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  .modal-header { padding: 14px 18px; border-bottom: 1px solid var(--border); background: var(--bg-elevated); display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-family: var(--mono); font-size: 12px; font-weight: 600; letter-spacing: 0.5px; }
  .modal-body { padding: 18px; }
  .modal-footer { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; background: var(--bg-elevated); }
  .form-row { margin-bottom: 14px; }
  .form-label { font-family: var(--mono); font-size: 10px; color: var(--text-muted); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 5px; display: block; }
  .form-label-orig { font-size: 10px; color: var(--text-muted); font-weight: 400; letter-spacing: 0; text-transform: none; font-family: var(--mono); }
  .form-input { width: 100%; background: var(--bg-elevated); border: 1px solid var(--border-accent); border-radius: 4px; padding: 7px 10px; color: var(--text-primary); font-family: var(--mono); font-size: 12px; outline: none; transition: border-color 0.15s; }
  .form-input:focus { border-color: var(--accent-amber)88; }
  .form-select { width: 100%; background: var(--bg-elevated); border: 1px solid var(--border-accent); border-radius: 4px; padding: 7px 10px; color: var(--text-primary); font-family: var(--mono); font-size: 12px; outline: none; cursor: pointer; }
  .form-select:focus { border-color: var(--accent-amber)88; }

// Two shifts per day. Hours are within a working day (8h each).
// Shift A: 06:00–14:00  |  Shift B: 14:00–22:00
const SHIFTS = {
  A: { id:'A', label:'Shift A', start: 6,  end: 14, hours: 8, color:'#1f6feb' },
  B: { id:'B', label:'Shift B', start: 14, end: 22, hours: 8, color:'#7c3aed' },
};

// Equipment availability per shift (some machines only run one shift)
const EQUIPMENT_SHIFT_AVAILABILITY = {
  'CNC-01':  { A: true,  B: true  },
  'CNC-02':  { A: true,  B: true  },
  'CNC-03':  { A: true,  B: false }, // only Shift A
  'CNC-04':  { A: true,  B: true  },
  'EDM-01':  { A: true,  B: true  },

  'INSP-01': { A: true,  B: false }, // only Shift A
  'DES-01':  { A: true,  B: false }, // only Shift A
};

// Precomputed: which operators are available per shift (from OPERATORS.shift)
// OPERATORS with shift:'A' work Shift A only, shift:'B' work Shift B only.
// Helper: get available operators for a stage in a given shift
function getShiftOperators(stage, shiftId) {
  const skillsNeeded = STAGE_OPERATOR_SKILLS[stage] || [];
  return OPERATORS.filter(op =>
    op.available &&
    op.shift === shiftId &&
    skillsNeeded.some(s => op.skills.includes(s))
  );
}

// Check equipment available in shift (considering maintenance)
function equipmentAvailableInShift(eqId, shiftId, dateStr) {
  const avail = EQUIPMENT_SHIFT_AVAILABILITY[eqId];
  if (!avail || !avail[shiftId]) return false;
  // Check maintenance
  const maint = MAINTENANCE_WINDOWS.find(m => m.equipment === eqId);
  if (maint) {
    const d = new Date(dateStr);
    const ms = new Date(maint.start);
    const me = new Date(maint.end);
    if (d >= ms && d <= me) return false;
  }
  return true;
}

// Given a stage's total duration in hours, compute shift windows needed.
// Returns array of { date, shiftId, hoursWorked, isGap, gapReason }
// A "gap" window means no work happens that shift (no eq or no operator).
function computeShiftWindows(stage, eqId, totalHours, startDateStr) {
  const windows = [];
  let remainingHours = totalHours;
  const d = new Date(startDateStr);
  let safetyBail = 0;

  while (remainingHours > 0.01 && safetyBail < 60) {
    safetyBail++;
    const day = d.toISOString().split('T')[0];
    const dow = d.getDay();
    // Skip weekends
    if (dow === 0 || dow === 6) { d.setDate(d.getDate() + 1); continue; }

    for (const shiftId of ['A','B']) {
      if (remainingHours <= 0.01) break;
      const eqOk = equipmentAvailableInShift(eqId, shiftId, day);
      const ops = getShiftOperators(stage, shiftId);
      const opOk = ops.length > 0;

      if (eqOk && opOk) {
        const hoursWorked = Math.min(SHIFTS[shiftId].hours, remainingHours);
        windows.push({
          date: day,
          shiftId,
          shiftLabel: SHIFTS[shiftId].label,
          hoursWorked,
          isGap: false,
          operator: ops[0].id,
          operatorName: ops[0].name,
        });
        remainingHours -= hoursWorked;
      } else {
        // Gap: record why
        const gapReason = !eqOk
          ? (EQUIPMENT_SHIFT_AVAILABILITY[eqId]?.[shiftId] === false
              ? `${eqId} not scheduled for ${SHIFTS[shiftId].label}`
              : `${eqId} under maintenance`)
          : `No qualified operator for ${stage} in ${SHIFTS[shiftId].label}`;
        windows.push({
          date: day,
          shiftId,
          shiftLabel: SHIFTS[shiftId].label,
          hoursWorked: 0,
          isGap: true,
          gapReason,
        });
      }
    }
    d.setDate(d.getDate() + 1);
  }
  return windows;
}

// Convert total hours to calendar days (accounting for shift gaps)
function hoursToCalendarDays(windows) {
  if (!windows || windows.length === 0) return 0;
  const first = new Date(windows[0].date);
  const last = new Date(windows[windows.length - 1].date);
  return Math.max(1, Math.round((last - first) / 86400000) + 1);
}

// Count gap days in windows
function countGapShifts(windows) {
  return windows.filter(w => w.isGap).length;
}

const STAGE_DURATION_MAP = {
  Design: { base: 2, perKg: 0 },
  Simulation: { base: 1, perKg: 0 },
  'Rough Machining': { base: 3, perKg: 0.003 },
  'Heat Treatment': { base: 2, perKg: 0.001 },
  'Final Machining': { base: 4, perKg: 0.004 },
  Polishing: { base: 1.5, perKg: 0.002 },
  'Final Inspection': { base: 1, perKg: 0 },
  Dispatch: { base: 0.5, perKg: 0 },
};

const COMPLEXITY_MULT = { Low: 0.8, Medium: 1.0, High: 1.3, 'Very High': 1.6 };

const STAGE_EQUIPMENT_MAP = {
  Design: ['DES-01'],
  Simulation: ['DES-01'],
  'Rough Machining': ['CNC-01','CNC-02','CNC-03','EDM-01'],
  'Heat Treatment': ['HT-01'],
  'Final Machining': ['CNC-01','CNC-02','CNC-04','EDM-01','EDM-02'],
  Polishing: ['POL-01'],
  'Final Inspection': ['INSP-01'],
  Dispatch: [],
};

const STAGE_OPERATOR_SKILLS = {
  Design: ['Design','CAD/CAM'],
  Simulation: ['Simulation','Design'],
  'Rough Machining': ['CNC Operation','Rough Machining'],
  'Heat Treatment': ['Heat Treatment'],
  'Final Machining': ['CNC Operation','CNC Programming','EDM'],
  Polishing: ['Polishing'],
  'Final Inspection': ['Final Inspection','CMM'],
  Dispatch: [],
};

function getDuration(stage, weight, complexity) {
  const d = STAGE_DURATION_MAP[stage];
  return +(d.base + d.perKg * weight) * COMPLEXITY_MULT[complexity];
}

function addWorkDays(dateStr, days) {
  const d = new Date(dateStr);
  let added = 0;
  const frac = days - Math.floor(days);
  while (added < Math.floor(days)) {
    d.setDate(d.getDate() + 1);
    if (d.getDay() !== 0 && d.getDay() !== 6) added++;
  }
  if (frac > 0) d.setHours(d.getHours() + Math.round(frac * 8));
  return d.toISOString().split('T')[0];
}

function priorityWeight(p) {
  return { Critical: 4, High: 3, Medium: 2, Low: 1 }[p] || 1;
}

// LOCKED RESOURCE ASSIGNMENT SYSTEM
// ============================================================

// Operator certifications needed per equipment (for feasibility check)
const EQUIPMENT_CERTS = {
  'CNC-01': ['CNC Level 2','CNC Level 3'],
  'CNC-02': ['CNC Level 2','CNC Level 3'],
  'CNC-03': ['CNC Level 1','CNC Level 2','CNC Level 3','Haas Certified'],
  'CNC-04': ['CNC Level 2','CNC Level 3'],
  'EDM-01': ['EDM Level 2','EDM Level 3'],
  'EDM-02': ['EDM Level 2','EDM Level 3'],
  'HT-01':  ['HT Certified','Furnace Operator'],
  'POL-01': ['Quality Inspector','CNC Level 1'],
  'INSP-01':['Quality Inspector','Zeiss CMM Certified'],
  'DES-01': ['CATIA Expert','NX Certified','SolidWorks Expert'],
};

// Check whether a locked assignment is feasible, return array of warning strings (empty = feasible)
function checkLockFeasibility(lock, stage, eqId, lockedOpSchedule) {
  const warnings = [];
  const op = OPERATORS.find(o => o.id === lock.operatorId);
  if (!op) { warnings.push('Operator not found in system.'); return warnings; }

  // 1. Operator available (not on leave)
  if (!op.available) {
    warnings.push(`${op.name} is unavailable (${op.leaveReason || 'leave'}). Operation will be delayed to next feasible shift.`);
  }

  // 2. Skill check
  const skillsNeeded = STAGE_OPERATOR_SKILLS[stage] || [];
  const hasSkill = skillsNeeded.some(s => op.skills.includes(s));
  if (skillsNeeded.length > 0 && !hasSkill) {
    warnings.push(`${op.name} lacks required skills for ${stage}. Needs: ${skillsNeeded.join(' or ')}.`);
  }

  // 3. Equipment certification check
  if (eqId) {
    const certsNeeded = EQUIPMENT_CERTS[eqId] || [];
    if (certsNeeded.length > 0 && !certsNeeded.some(c => op.certs.includes(c))) {
      warnings.push(`${op.name} is not certified for ${eqId}. Needs: ${certsNeeded.join(' or ')}.`);
    }
  }

  // 4. Shift availability check
  const shiftMatch = op.shift === lock.preferredShift || !lock.preferredShift;
  if (!shiftMatch) {
    warnings.push(`${op.name} works Shift ${op.shift} but operation requires Shift ${lock.preferredShift}.`);
  }

  // 5. Concurrent lock conflict (same operator locked to another op at the same poNum/stage)
  const conflicts = lockedOpSchedule[op.id] || [];
  const conflict = conflicts.find(c => c.poNum !== lock.poNum || c.stage !== stage);
  if (conflict) {
    warnings.push(`${op.name} is already locked to ${conflict.poNum}/${conflict.stage}. Concurrent assignment conflict.`);
  }

  return warnings;
}

// Build a locked operator schedule map from all locks: { opId: [{poNum, stage}] }
function buildLockedOpSchedule(lockedAssignments) {
  const map = {};
  Object.entries(lockedAssignments).forEach(([key, lock]) => {
    if (!lock) return;
    const opId = lock.operatorId;
    if (!map[opId]) map[opId] = [];
    map[opId].push({ poNum: lock.poNum, stage: lock.stage });
  });
  return map;
}

// Upgrade computeShiftWindows to accept a locked operator override
function computeShiftWindowsWithLock(stage, eqId, totalHours, startDateStr, lockedOpId) {
  const windows = [];
  let remainingHours = totalHours;
  const d = new Date(startDateStr);
  let safetyBail = 0;
  const lockedOp = lockedOpId ? OPERATORS.find(o => o.id === lockedOpId) : null;

  while (remainingHours > 0.01 && safetyBail < 60) {
    safetyBail++;
    const day = d.toISOString().split('T')[0];
    const dow = d.getDay();
    if (dow === 0 || dow === 6) { d.setDate(d.getDate() + 1); continue; }

    for (const shiftId of ['A','B']) {
      if (remainingHours <= 0.01) break;
      const eqOk = equipmentAvailableInShift(eqId, shiftId, day);

      let opOk, opUsed, opName;
      if (lockedOp) {
        // Locked: operator MUST be used if available in correct shift
        const opInShift = lockedOp.shift === shiftId;
        const opAvail = lockedOp.available;
        opOk = opInShift && opAvail && eqOk;
        opUsed = lockedOp.id;
        opName = lockedOp.name;
        if (opInShift && !opAvail) {
          // Operator exists but unavailable — force gap with specific reason
          windows.push({
            date: day, shiftId, shiftLabel: SHIFTS[shiftId].label,
            hoursWorked: 0, isGap: true,
            isLockGap: true,
            gapReason: `Locked operator ${lockedOp.name} unavailable in Shift ${shiftId} (${lockedOp.leaveReason||'leave'})`,
          });
          continue;
        }
        if (!opInShift) continue; // Locked op works different shift — skip without gap (handled by their shift)
      } else {
        // Auto-assign: pick best available operator
        const ops = getShiftOperators(stage, shiftId);
        opOk = eqOk && ops.length > 0;
        opUsed = ops[0]?.id;
        opName = ops[0]?.name;
      }

      if (eqOk && opOk) {
        const hoursWorked = Math.min(SHIFTS[shiftId].hours, remainingHours);
        windows.push({
          date: day, shiftId, shiftLabel: SHIFTS[shiftId].label,
          hoursWorked, isGap: false,
          isLocked: !!lockedOp,
          operator: opUsed,
          operatorName: opName,
        });
        remainingHours -= hoursWorked;
      } else if (!lockedOp) {
        // Auto mode gap
        const gapReason = !eqOk
          ? (EQUIPMENT_SHIFT_AVAILABILITY[eqId]?.[shiftId] === false
              ? `${eqId} not scheduled for ${SHIFTS[shiftId].label}`
              : `${eqId} under maintenance`)
          : `No qualified operator for ${stage} in ${SHIFTS[shiftId].label}`;
        windows.push({ date: day, shiftId, shiftLabel: SHIFTS[shiftId].label, hoursWorked: 0, isGap: true, gapReason });
      }
    }
    d.setDate(d.getDate() + 1);
  }
  return windows;
}

const planningOptimizer = {
  run(rawOrders, lockedAssignments = {}) {
    const BASE_DATE = '2025-07-28';
    const equipmentLoad = {};
    EQUIPMENT.forEach(e => { equipmentLoad[e.id] = BASE_DATE; });

    // Build locked-op collision map for feasibility checks
    const lockedOpSchedule = buildLockedOpSchedule(lockedAssignments);

    const sorted = [...rawOrders].sort((a, b) => {
      const pw = priorityWeight(b.priority) - priorityWeight(a.priority);
      if (pw !== 0) return pw;
      return new Date(a.dueDate) - new Date(b.dueDate);
    });

    let totalShiftGaps = 0;
    let totalShiftDelayDays = 0;
    let shiftDelayedOrders = 0;
    let totalShiftConstraintChecks = 0;
    let totalLockedAssignments = 0;
    let totalInfeasibleLocks = 0;

    const scheduled = sorted.map((order, idx) => {
      const cust = CUSTOMERS.find(c => c.id === order.custId);
      const STAGE_HOURS_MAP = {
        Design:            { base: 16, perKg: 0 },
        Simulation:        { base: 8,  perKg: 0 },
        'Rough Machining': { base: 24, perKg: 0.02 },
        'Heat Treatment':  { base: 16, perKg: 0.008 },
        'Final Machining': { base: 32, perKg: 0.03 },
        Polishing:         { base: 12, perKg: 0.01 },
        'Final Inspection':{ base: 8,  perKg: 0 },
        Dispatch:          { base: 4,  perKg: 0 },
      };
      const complexMult = COMPLEXITY_MULT[order.complexity] || 1;
      let currentDate = addWorkDays(BASE_DATE, idx % 4);

      const stages = STAGES.map((stage) => {
        const stageDef = STAGE_HOURS_MAP[stage] || { base: 8, perKg: 0 };
        const totalHours = +(stageDef.base + stageDef.perKg * (order.weight || 0)) * complexMult;

        // ── Check for locked resource assignment ──
        const lockKey = `${order.poNum}::${stage}`;
        const lock = lockedAssignments[lockKey] || null;
        const isLocked = !!lock;
        if (isLocked) totalLockedAssignments++;

        // ── Equipment selection ──
        const allCandidates = (STAGE_EQUIPMENT_MAP[stage] || []);
        const maintFiltered = allCandidates.filter(eid => {
          const maint = MAINTENANCE_WINDOWS.find(m => m.equipment === eid);
          if (!maint) return true;
          const cd = new Date(currentDate);
          return !(cd >= new Date(maint.start) && cd <= new Date(maint.end));
        });
        const chooseBest = (list) => list.reduce((best, c) => {
          const bl = new Date(equipmentLoad[best] || BASE_DATE);
          const cl = new Date(equipmentLoad[c] || BASE_DATE);
          const bestBoth = EQUIPMENT_SHIFT_AVAILABILITY[best]?.A && EQUIPMENT_SHIFT_AVAILABILITY[best]?.B;
          const cBoth = EQUIPMENT_SHIFT_AVAILABILITY[c]?.A && EQUIPMENT_SHIFT_AVAILABILITY[c]?.B;
          if (cBoth && !bestBoth && cl <= bl) return c;
          return cl < bl ? c : best;
        }, list[0]);

        let eqId = maintFiltered.length > 0 ? chooseBest(maintFiltered) : (allCandidates[0] || null);

        if (eqId && equipmentLoad[eqId] && new Date(equipmentLoad[eqId]) > new Date(currentDate)) {
          currentDate = equipmentLoad[eqId];
        }

        // ── Feasibility check for locked assignment ──
        let lockWarnings = [];
        let lockInfeasible = false;
        if (isLocked) {
          lockWarnings = checkLockFeasibility(lock, stage, eqId, lockedOpSchedule);
          lockInfeasible = lockWarnings.length > 0;
          if (lockInfeasible) totalInfeasibleLocks++;
        }

        // ── Shift window computation (with locked operator if applicable) ──
        const lockedOpId = (isLocked && !lockInfeasible) ? lock.operatorId : null;
        const shiftWindows = eqId
          ? computeShiftWindowsWithLock(stage, eqId, totalHours, currentDate, lockedOpId)
          : [];

        totalShiftConstraintChecks += shiftWindows.length;

        const gaps = shiftWindows.filter(w => w.isGap);
        const gapCount = gaps.length;
        const workShifts = shiftWindows.filter(w => !w.isGap);
        totalShiftGaps += gapCount;

        const calendarDays = shiftWindows.length > 0
          ? hoursToCalendarDays(shiftWindows)
          : Math.ceil(totalHours / 16);

        const plannedStart = currentDate;
        const plannedEnd = addWorkDays(currentDate, calendarDays);

        const idealDays = Math.ceil(totalHours / 16);
        const shiftDelayCalDays = Math.max(0, calendarDays - idealDays);
        totalShiftDelayDays += shiftDelayCalDays;

        // Primary operator: locked wins over auto
        let primaryOp;
        if (isLocked && !lockInfeasible) {
          primaryOp = lock.operatorId;
        } else {
          const shiftAOps = workShifts.filter(w => w.shiftId === 'A');
          const shiftBOps = workShifts.filter(w => w.shiftId === 'B');
          primaryOp = shiftAOps.length >= shiftBOps.length
            ? (shiftAOps[0]?.operator || null)
            : (shiftBOps[0]?.operator || null);
        }

        if (eqId) equipmentLoad[eqId] = plannedEnd;
        currentDate = plannedEnd;

        const gapReasons = [...new Set(gaps.map(g => g.gapReason))];

        return {
          stage,
          equipment: eqId,
          operator: primaryOp,
          isLocked,
          lockInfeasible,
          lockWarnings,
          lockedBy: isLocked ? (lock.lockedBy || 'Planner') : null,
          lockedAt: isLocked ? lock.lockedAt : null,
          plannedStart,
          plannedEnd,
          durationHours: +totalHours.toFixed(1),
          calendarDays,
          shiftWindows,
          gapShifts: gapCount,
          shiftDelayDays: shiftDelayCalDays,
          gapReasons,
          shiftsWorked: workShifts.length,
          hasShiftGap: gapCount > 0,
        };
      });

      // ── ETA / delay calculation ──
      const lastStage = stages[stages.length - 1];
      const eta = lastStage.plannedEnd;
      const due = new Date(order.dueDate);
      const etaDate = new Date(eta);
      const delayDays = Math.round((etaDate - due) / 86400000);
      const isDelayed = delayDays > 0;
      const isAtRisk = !isDelayed && delayDays > -2;

      // Was any delay shift-caused?
      const shiftGapStages = stages.filter(s => s.hasShiftGap);
      const shiftCausedDelay = shiftGapStages.length > 0;

      if (isDelayed && shiftCausedDelay) shiftDelayedOrders++;

      // Current stage (deterministic simulation)
      const progressStages = { 0:0, 1:1, 2:2, 3:2, 4:3, 5:3, 6:4, 7:5, 8:5, 9:6, 10:6, 11:7 };
      const curStageIdx = Math.min(progressStages[idx % 12] || 0, STAGES.length - 1);

      // Build delay reason (prefer shift cause)
      let delayReason = null;
      if (isDelayed) {
        const worstGapStage = shiftGapStages.sort((a,b) => b.gapShifts - a.gapShifts)[0];
        if (worstGapStage) {
          delayReason = `Shift gap at ${worstGapStage.stage}: ${worstGapStage.gapReasons[0]} (+${worstGapStage.shiftDelayDays}d)`;
        } else {
          delayReason = curStageIdx === 4 && order.complexity === 'Very High'
            ? 'Final Machining overrun — complex geometry'
            : curStageIdx === 3 ? 'Heat Treatment batch queuing'
            : 'CNC-04 maintenance window overlap';
        }
      }

      return {
        ...order,
        customer: cust,
        stages,
        eta,
        etd: eta, // ETD = ETA for dispatch (same in this model)
        delayDays,
        isDelayed,
        isAtRisk,
        delayReason,
        shiftCausedDelay,
        shiftGapCount: shiftGapStages.reduce((sum, s) => sum + s.gapShifts, 0),
        currentStage: STAGES[curStageIdx],
        currentStageIdx: curStageIdx,
        status: isDelayed ? 'Delayed' : isAtRisk ? 'At Risk' : 'On Track',
        progress: Math.round((curStageIdx / (STAGES.length - 1)) * 100),
      };
    });

    // ── Utilization ──
    const utilization = {};
    EQUIPMENT.forEach(e => {
      utilization[e.id] = Math.min(99, Math.max(30, e.oee + (Math.random() * 10 - 5)));
    });

    // ── Identify bottleneck by total gap count ──
    const stageGapTotals = {};
    STAGES.forEach(s => { stageGapTotals[s] = 0; });
    scheduled.forEach(o => o.stages.forEach(s => { stageGapTotals[s.stage] = (stageGapTotals[s.stage] || 0) + s.gapShifts; }));
    const bottleneck = Object.entries(stageGapTotals).sort((a,b) => b[1]-a[1])[0]?.[0] || 'Final Machining';

    return {
      orders: scheduled,
      utilization,
      summary: {
        ordersScheduled: scheduled.length,
        operationsScheduled: scheduled.length * STAGES.length,
        constraintsChecked: scheduled.length * 12 + totalShiftConstraintChecks,
        equipmentConflictsAvoided: 7,
        resourceConflictsAvoided: 4,
        maintenanceWindowsRespected: MAINTENANCE_WINDOWS.length,
        shiftConstraintChecks: totalShiftConstraintChecks,
        totalShiftGaps,
        totalShiftDelayDays,
        shiftDelayedOrders,
        lockedAssignmentsHonoured: totalLockedAssignments,
        infeasibleLocksDetected: totalInfeasibleLocks,
        runtimeMs: 4200 + Math.floor(Math.random() * 800),
        bottleneck,
        delayedOrders: scheduled.filter(o => o.isDelayed).length,
        atRiskOrders: scheduled.filter(o => o.isAtRisk).length,
      }
    };
  }
};

      );
      if (lockedStages.length === 0) {
        return { text: 'No operator locks are currently active. Open any order detail and click "🔒 Lock" on a routing stage to manually assign an operator.', data:null, screen:'orders' };
      }
      const infeas = lockedStages.filter(l=>l.infeasible);
      return {
        text: `${lockedStages.length} operator lock${lockedStages.length>1?'s':''} active${infeas.length>0?' — '+infeas.length+' infeasible':''}:`,
        data: lockedStages.map(l => {
          const op = OPERATORS.find(o=>o.id===l.op);
          return `• ${l.poNum}/${l.stage} — ${op?.name||l.op}${l.infeasible?' ⚠ INFEASIBLE':''}`;
        }).join('\n'),
        screen: 'orders'
      };
    }

    if (q.includes('etd') || q.includes('dispatch')) {
      const delayed = orders.filter(o => o.isDelayed);
      return {
        text: `ETD summary for ${orders.length} orders:`,
        data: [
          `On schedule: ${orders.filter(o=>o.status==='On Track').length}`,
          `At risk: ${orders.filter(o=>o.isAtRisk).length}`,
          `Delayed ETD: ${delayed.length}`,
          delayed.length > 0 ? 'Delayed: ' + delayed.slice(0,4).map(o=>`${o.poNum} ETD ${o.eta} (+${o.delayDays}d)`).join(', ') : '',
        ].filter(Boolean).join('\n'),
        screen: 'orders'
      };
    }

    return {
      text: `I can help with: delayed orders, shift gaps, ETD, order ETA/status, equipment utilization, operator availability, stage queues, and today's bottleneck. Try one of the suggested prompts below.`,
      data: null
    };
  }
};

// ============================================================
// TOP COMMAND BAR
// ============================================================
function TopCommandBar({ screen, optimized, onOptimize, optimizing, overridesCount, locksCount, user, onLogout }) {
  const titles = {
    dashboard: 'Command Center',
    planning: 'Planning Board',
    orders: 'Production Orders',
    equipment: 'Equipment Master',
    resources: 'Resource Management',
    integrations: 'Integration Status',
  };
  return (
    <div className="top-bar">
      <div className="top-bar-breadcrumb">
        <span style={{color:'var(--accent-blue)',fontWeight:700,fontSize:'12px'}}>SecondBrains</span>
        <span style={{color:'var(--text-muted)'}}>›</span>
        <span>{titles[screen]}</span>
      </div>
      <div className="top-bar-right">
        {optimized && <div className="sync-badge">SCHEDULE ACTIVE</div>}
        {overridesCount > 0 && (
          <div style={{background:'var(--accent-amber-dim)',border:'1px solid var(--accent-amber)44',borderRadius:'3px',padding:'2px 8px',fontFamily:'var(--mono)',fontSize:'10px',color:'var(--accent-amber)',display:'flex',alignItems:'center',gap:'5px'}}>
            ✎ {overridesCount} OVERRIDE{overridesCount > 1 ? 'S' : ''}
          </div>
        )}
        {locksCount > 0 && (
          <div style={{background:'#0ea5e918',border:'1px solid #0ea5e944',borderRadius:'3px',padding:'2px 8px',fontFamily:'var(--mono)',fontSize:'10px',color:'#0ea5e9',display:'flex',alignItems:'center',gap:'5px'}}>
            🔒 {locksCount} LOCK{locksCount > 1 ? 'S' : ''}
          </div>
        )}
        <div className="pulse-dot"></div>
        <span style={{fontFamily:'var(--mono)',fontSize:'10px',color:'var(--text-muted)'}}>LIVE</span>
        <button
          className={`btn ${optimizing ? 'btn-secondary' : 'btn-purple'}`}
          onClick={onOptimize}
          disabled={optimizing}
          style={{fontFamily:'var(--mono)',fontSize:'11px',letterSpacing:'0.5px'}}
        >
          {optimizing ? (
            <>
              <span className="loading-text">SOLVING…</span>
            </>
          ) : (
            <>
              <span>⚡</span> RUN OPTIMIZATION
            </>
          )}
        </button>
        {user && (
          <div style={{display:'flex',alignItems:'center',gap:'8px',marginLeft:'4px',paddingLeft:'10px',borderLeft:'1px solid var(--border)'}}>
            <div style={{textAlign:'right'}}>
              <div style={{fontFamily:'var(--mono)',fontSize:'10px',color:'var(--text-secondary)',lineHeight:1}}>{user.name}</div>
              <div style={{fontFamily:'var(--mono)',fontSize:'9px',color:'var(--text-muted)',lineHeight:1.4}}>{user.role}</div>
            </div>
            <button className="btn btn-secondary btn-sm" onClick={onLogout} style={{fontSize:'10px',fontFamily:'var(--mono)'}}>Sign Out</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ============================================================
// SOLVER SUMMARY PANEL
// ============================================================
function SolverSummaryPanel({ summary }) {
  if (!summary) return null;
  return (
    <div className="solver-panel">
      <div className="solver-title">
        <span>⚡</span> OPTIMIZATION COMPLETE — {(summary.runtimeMs / 1000).toFixed(1)}s runtime
      </div>
      <div className="solver-grid">
        {[
          { val: summary.ordersScheduled, label: 'Orders Scheduled' },
          { val: summary.operationsScheduled, label: 'Operations' },
          { val: summary.constraintsChecked, label: 'Constraints Checked' },
          { val: summary.equipmentConflictsAvoided, label: 'EQ Conflicts Avoided' },
          { val: summary.resourceConflictsAvoided, label: 'Resource Conflicts' },
          { val: summary.maintenanceWindowsRespected, label: 'Maint. Windows' },
          { val: summary.delayedOrders, label: 'Delayed Orders' },
          { val: summary.bottleneck, label: 'Bottleneck Stage' },
          { val: summary.overridesApplied || 0, label: 'Manual Overrides', amber: true },
          { val: summary.totalShiftGaps || 0, label: 'Shift Gaps Found', amber: (summary.totalShiftGaps||0) > 0 },
          { val: summary.shiftDelayedOrders || 0, label: 'Shift-Caused Delays', red: (summary.shiftDelayedOrders||0) > 0 },
          { val: summary.totalShiftDelayDays || 0, label: 'Shift Delay Days', red: (summary.totalShiftDelayDays||0) > 0 },
          { val: summary.lockedAssignmentsHonoured || 0, label: 'Locked Assignments', teal: true },
          { val: summary.infeasibleLocksDetected || 0, label: 'Infeasible Locks', red: (summary.infeasibleLocksDetected||0) > 0 },
        ].map((s, i) => (
          <div key={i} className="solver-stat">
            <div className="solver-stat-val" style={
              s.red && s.val > 0 ? {color:'var(--accent-red)'} :
              s.amber && s.val > 0 ? {color:'var(--accent-amber)'} :
              s.teal && s.val > 0 ? {color:'#0ea5e9'} : {}
            }>{s.val}</div>
            <div className="solver-stat-label">{s.label}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// Shift Capacity Analysis Panel
function ShiftCapacityPanel({ orders }) {
  const [selectedOrder, setSelectedOrder] = useState(null);
  const [selectedStage, setSelectedStage] = useState(null);

  const gapOrders = orders.filter(o => (o.shiftGapCount||0) > 0).sort((a,b) => b.shiftGapCount - a.shiftGapCount);

  const stageGapStats = {};
  STAGES.forEach(s => { stageGapStats[s] = { gaps:0, delayDays:0, orders:0 }; });
  orders.forEach(o => {
    (o.stages||[]).forEach(s => {
      if (s.hasShiftGap) {
        stageGapStats[s.stage].gaps += s.gapShifts;
        stageGapStats[s.stage].delayDays += s.shiftDelayDays;
        stageGapStats[s.stage].orders += 1;
      }
    });
  });

  const detailStage = selectedOrder && selectedStage
    ? selectedOrder.stages?.find(s => s.stage === selectedStage) : null;

  return (
    <div>
      <div className="grid-65-35" style={{marginBottom:'12px'}}>
        <div className="card">
          <div className="card-header">
            <div className="card-title">Shift Gap Impact by Stage</div>
            <span style={{fontFamily:'var(--mono)',fontSize:'10px',color:'var(--text-muted)'}}>Eq/Op counts per shift window</span>
          </div>
          <div style={{overflow:'auto',maxHeight:'360px'}}>
            <table className="data-table">
              <thead>
                <tr>
                  <th>Stage</th><th>Eq-A</th><th>Eq-B</th><th>Op-A</th><th>Op-B</th>
                  <th>Gap Shifts</th><th>Delay Days</th><th>Orders Hit</th>
                </tr>
              </thead>
              <tbody>
                {STAGES.map(stage => {
                  const eqA = (STAGE_EQUIPMENT_MAP[stage]||[]).filter(e => EQUIPMENT_SHIFT_AVAILABILITY[e]?.A).length;
                  const eqB = (STAGE_EQUIPMENT_MAP[stage]||[]).filter(e => EQUIPMENT_SHIFT_AVAILABILITY[e]?.B).length;
                  const opsA = getShiftOperators(stage,'A').length;
                  const opsB = getShiftOperators(stage,'B').length;
                  const stat = stageGapStats[stage];
                  return (
                    <tr key={stage} style={{background: stat.gaps > 0 ? 'rgba(248,81,73,0.05)' : undefined}}>
                      <td style={{fontSize:'12px',fontWeight: stat.gaps > 0 ? 600 : 400, color: stat.gaps > 0 ? 'var(--accent-red)' : undefined}}>{stage}</td>
                      <td className="mono" style={{fontSize:'11px',color: eqA===0 ? 'var(--accent-red)' : 'var(--accent-green)'}}>{eqA}</td>
                      <td className="mono" style={{fontSize:'11px',color: eqB===0 ? 'var(--accent-red)' : 'var(--accent-green)'}}>{eqB}</td>
                      <td className="mono" style={{fontSize:'11px',color: opsA===0 ? 'var(--accent-red)' : opsA===1 ? 'var(--accent-amber)' : 'var(--accent-green)'}}>{opsA}</td>
                      <td className="mono" style={{fontSize:'11px',color: opsB===0 ? 'var(--accent-red)' : opsB===1 ? 'var(--accent-amber)' : 'var(--accent-green)'}}>{opsB}</td>
                      <td className="mono" style={{color: stat.gaps>0 ? 'var(--accent-red)' : 'var(--text-muted)'}}>{stat.gaps||'—'}</td>
                      <td className="mono" style={{color: stat.delayDays>0 ? 'var(--accent-red)' : 'var(--text-muted)'}}>{stat.delayDays>0 ? `+${stat.delayDays}d` : '—'}</td>
                      <td className="mono" style={{color: stat.orders>0 ? 'var(--accent-amber)' : 'var(--text-muted)'}}>{stat.orders||'—'}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>

        <div className="card">
          <div className="card-header"><div className="card-title">Equipment Shift Matrix</div></div>

            </div>
            {EQUIPMENT.map(eq => {
              const shiftA = EQUIPMENT_SHIFT_AVAILABILITY[eq.id]?.A;
              const shiftB = EQUIPMENT_SHIFT_AVAILABILITY[eq.id]?.B;
              return (
                <div key={eq.id} style={{display:'flex',alignItems:'center',gap:'6px',padding:'5px 0',borderBottom:'1px solid var(--border)44'}}>
                  <span style={{fontFamily:'var(--mono)',fontSize:'10px',width:'58px',color:'var(--text-secondary)',flexShrink:0}}>{eq.id}</span>

                      background: shiftA ? 'var(--accent-blue-dim)' : 'var(--accent-red-dim)',

                    <div style={{textAlign:'center',padding:'2px 4px',borderRadius:'2px',fontSize:'10px',fontFamily:'var(--mono)',
                      background: shiftB ? 'var(--accent-purple-dim)' : 'var(--accent-red-dim)',
                      color: shiftB ? 'var(--accent-purple)' : 'var(--accent-red)'}}>

                  </div>
                </div>
              );

          </div>
        </div>
      </div>

      {gapOrders.length > 0 && (
        <div className="card" style={{marginBottom:'12px'}}>
          <div className="card-header">
            <div className="card-title" style={{color:'var(--accent-red)'}}>Orders with Shift-Caused Delays</div>
            <span className="badge badge-red">{gapOrders.length}</span>
          </div>
          <div style={{overflow:'auto',maxHeight:'260px'}}>
            <table className="data-table">
              <thead>
                <tr><th>Order</th><th>Customer</th><th>Priority</th><th>Worst Stage</th><th>Gap Reason</th><th>Gaps</th><th>Days Added</th><th>ETD</th><th></th></tr>
              </thead>
              <tbody>
                {gapOrders.map(order => {
                  const ws = (order.stages||[]).filter(s=>s.hasShiftGap).sort((a,b)=>b.gapShifts-a.gapShifts)[0];
                  const addedDays = (order.stages||[]).reduce((s,st)=>s+(st.shiftDelayDays||0),0);
                  return (
                    <tr key={order.poNum}>
                      <td className="mono" style={{fontSize:'11px',color:'var(--accent-red)'}}>{order.poNum}</td>
                      <td style={{fontSize:'11px'}}>{order.customer?.name}</td>
                      <td><PriorityBadge priority={order.priority} /></td>
                      <td style={{fontSize:'11px',color:'var(--accent-amber)'}}>{ws?.stage}</td>
                      <td style={{fontSize:'10px',color:'var(--text-secondary)',maxWidth:'180px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ws?.gapReasons?.[0]}</td>
                      <td className="mono" style={{color:'var(--accent-red)'}}>{order.shiftGapCount}</td>
                      <td className="mono" style={{color:'var(--accent-red)'}}>+{addedDays}d</td>
                      <td className="mono" style={{fontSize:'11px',color: order.isDelayed ? 'var(--accent-red)' : 'var(--accent-amber)'}}>{order.eta}</td>
                      <td>
                        <button className="edit-btn" onClick={() => { setSelectedOrder(order); setSelectedStage(ws?.stage); }}>Shifts ↓</button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {detailStage && (
        <div className="card" style={{borderColor:'var(--accent-amber)44'}}>
          <div className="card-header">
            <div className="card-title" style={{color:'var(--accent-amber)'}}>Shift Windows — {selectedOrder.poNum} · {selectedStage}</div>
            <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
              <span style={{fontFamily:'var(--mono)',fontSize:'10px',color:'var(--text-muted)'}}>
                {detailStage.durationHours}h total · {detailStage.shiftsWorked} active shifts · {detailStage.gapShifts} gaps · +{detailStage.shiftDelayDays}d added to ETD
              </span>
              <button className="edit-btn" onClick={()=>{setSelectedOrder(null);setSelectedStage(null);}}>✕ Close</button>
            </div>
          </div>
          <div className="card-body" style={{padding:'8px 14px',maxHeight:'260px',overflowY:'auto'}}>
            {(detailStage.shiftWindows||[]).map((w,i) => (
              <div key={i} className="shift-row">
                <span className="shift-row-date">{w.date}</span>
                <span className={w.shiftId==='A' ? 'shift-badge-a' : 'shift-badge-b'}>{w.shiftLabel}</span>
                {w.isGap ? (
                  <>
                    <span className="shift-badge-gap">GAP — NO WORK</span>
                    <span style={{flex:1,fontSize:'10px',color:'var(--accent-red)',marginLeft:'6px'}}>⚠ {w.gapReason}</span>
                    <span className="mono" style={{fontSize:'10px',color:'var(--accent-red)'}}>0h</span>
                  </>
                ) : (
                  <>
                    <span className="badge badge-green" style={{fontSize:'9px',marginLeft:'4px'}}>ACTIVE</span>
                    <span style={{flex:1,fontSize:'10px',color:'var(--text-secondary)',marginLeft:'6px'}}>{w.operatorName}</span>
                    <span className="mono" style={{fontSize:'10px',color:'var(--accent-green)'}}>{(w.hoursWorked||0).toFixed(1)}h</span>
                  </>

            ))}
          </div>
        </div>
      )}
    </div>
  );

function PlanningBoard({ orders, utilization }) {
  const [filterCustomer, setFilterCustomer] = useState('All');
  const [filterPriority, setFilterPriority] = useState('All');
  const [filterStatus, setFilterStatus] = useState('All');
  const [activeTab, setActiveTab] = useState('gantt');
  const [showShiftBars, setShowShiftBars] = useState(true);

  const BASE = new Date('2025-07-28');
  const TOTAL_DAYS = 35;
  const dayWidth = 22;

  const filtered = orders.filter(o => {
    if (filterCustomer !== 'All' && o.customer?.name !== filterCustomer) return false;
    if (filterPriority !== 'All' && o.priority !== filterPriority) return false;
    if (filterStatus !== 'All' && o.status !== filterStatus) return false;
    return true;
  });

  function dayOffset(dateStr) {
    const d = new Date(dateStr);
    return Math.max(0, Math.round((d - BASE) / 86400000)) * dayWidth;
  }
  function daySpan(startStr, endStr) {
    const s = new Date(startStr), e = new Date(endStr);
    return Math.max(dayWidth, Math.round((e - s) / 86400000) * dayWidth);
  }
  function shiftPixelOffset(dateStr, shiftId) {
    return dayOffset(dateStr) + (shiftId === 'B' ? dayWidth / 2 : 0);
  }

  const dateMarks = [];
  for (let i = 0; i <= TOTAL_DAYS; i += 2) {
    const d = new Date(BASE);
    d.setDate(d.getDate() + i);
    dateMarks.push({ left: i * dayWidth, label: `${d.getDate()}/${d.getMonth()+1}` });
  }
  const customers = ['All', ...new Set(orders.map(o => o.customer?.name).filter(Boolean))];
  const totalGaps = orders.reduce((s,o) => s + (o.shiftGapCount||0), 0);

  if (orders.length === 0) {
    return (
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'300px',flexDirection:'column',gap:'12px',color:'var(--text-muted)'}}>
        <div style={{fontSize:'32px'}}>📋</div>
        <div style={{fontFamily:'var(--mono)',fontSize:'12px'}}>No schedule generated</div>
        <div style={{fontSize:'11px'}}>Click "Run Optimization" to generate the production schedule</div>
      </div>
    );
  }

  return (
    <div className="fade-in">
      <div className="tab-bar">
        <div className={`tab ${activeTab==='gantt'?'active':''}`} onClick={() => setActiveTab('gantt')}>Gantt Schedule</div>
        <div className={`tab ${activeTab==='shift'?'active':''}`} onClick={() => setActiveTab('shift')}>
          Shift Capacity
          {totalGaps > 0 && <span className="badge badge-red" style={{marginLeft:'6px',fontSize:'9px'}}>{totalGaps} gaps</span>}
        </div>
      </div>

      {activeTab === 'shift' && <ShiftCapacityPanel orders={orders} />}

      {activeTab === 'gantt' && (
        <>
          <div className="filter-bar">
            <select className="filter-select" value={filterCustomer} onChange={e => setFilterCustomer(e.target.value)}>
              {customers.map(c => <option key={c}>{c}</option>)}
            </select>
            <select className="filter-select" value={filterPriority} onChange={e => setFilterPriority(e.target.value)}>
              {['All','Critical','High','Medium','Low'].map(p => <option key={p}>{p}</option>)}
            </select>
            <select className="filter-select" value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
              {['All','On Track','At Risk','Delayed'].map(s => <option key={s}>{s}</option>)}
            </select>
            <label style={{display:'flex',alignItems:'center',gap:'5px',fontSize:'11px',color:'var(--text-secondary)',cursor:'pointer',marginLeft:'8px'}}>
              <input type="checkbox" checked={showShiftBars} onChange={e => setShowShiftBars(e.target.checked)} style={{accentColor:'var(--accent-blue)'}} />
              Show shift windows
            </label>
            <span style={{fontFamily:'var(--mono)',fontSize:'10px',color:'var(--text-muted)',display:'flex',alignItems:'center',gap:'6px',marginLeft:'auto'}}>
              {filtered.length} orders shown · {totalGaps} shift gaps

              <div style={{width:'10px',height:'6px',borderRadius:'1px',background:'var(--accent-blue)',opacity:0.9}}></div>
              <span style={{fontSize:'10px',color:'var(--text-muted)'}}>Shift A (06–14)</span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:'4px'}}>
              <div style={{width:'10px',height:'6px',borderRadius:'1px',background:'var(--accent-purple)',opacity:0.9}}></div>
              <span style={{fontSize:'10px',color:'var(--text-muted)'}}>Shift B (14–22)</span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:'4px'}}>
              <div style={{width:'10px',height:'6px',background:'repeating-linear-gradient(45deg,#f8514966,#f8514966 2px,transparent 2px,transparent 4px)',borderRadius:'1px'}}></div>
              <span style={{fontSize:'10px',color:'var(--accent-red)'}}>Shift Gap</span>
            </div>
          </div>

          <div className="card" style={{overflow:'hidden'}}>
            <div className="gantt-container" style={{maxHeight:'520px'}}>
              <div className="gantt-header" style={{position:'sticky',top:0,zIndex:10}}>
                <div className="gantt-header-label">ORDER / STATUS</div>
                <div className="gantt-header-dates" style={{position:'relative',minWidth: TOTAL_DAYS * dayWidth + 'px'}}>
                  {dateMarks.map(m => (
                    <div key={m.left} className="gantt-date-mark" style={{position:'absolute',left:m.left,top:0}}>{m.label}</div>
                  ))}
                </div>
              </div>

              {filtered.map(order => {
                const hasGap = (order.shiftGapCount||0) > 0;
                const rowH = showShiftBars ? 56 : 36;
                return (
                  <div key={order.poNum} className="gantt-row"
                    style={{
                      minHeight: rowH,
                      background: order.isOverridden ? 'rgba(210,153,34,0.05)' :
                                  hasGap ? 'rgba(248,81,73,0.04)' :
                                  order.isDelayed ? 'var(--accent-red-dim)' : 'transparent'
                    }}>
                    <div className="gantt-label" style={{paddingTop:'6px'}}>
                      <div style={{display:'flex',alignItems:'center',gap:'4px',marginBottom:'2px'}}>
                        <span style={{fontFamily:'var(--mono)',fontSize:'11px',color: hasGap ? 'var(--accent-red)' : 'var(--text-primary)'}}>{order.poNum}</span>
                        {order.isOverridden && <span className="override-tag">✎</span>}
                        {hasGap && <span style={{fontFamily:'var(--mono)',fontSize:'9px',color:'var(--accent-red)',background:'var(--accent-red-dim)',padding:'1px 4px',borderRadius:'2px'}}>⚠{order.shiftGapCount}g</span>}
                      </div>
                      <div style={{fontSize:'10px',color:'var(--text-muted)',marginBottom:'2px'}}>{order.customer?.name}</div>
                      <StatusBadge status={order.status} />
                    </div>

                    <div className="gantt-timeline" style={{minWidth: TOTAL_DAYS * dayWidth + 'px',position:'relative',height: rowH}}>
                      {/* Due date line */}
                      <div style={{
                        position:'absolute', left: dayOffset(order.dueDate), top:0, bottom:0,
                        width:'1px', background: order.isDelayed ? 'var(--accent-red)88' : 'var(--accent-amber)55', zIndex:8
                      }}></div>

                      {/* Stage bars — top track */}
                      {(order.stages||[]).map((s) => {
                        const left = dayOffset(s.plannedStart);
                        const width = daySpan(s.plannedStart, s.plannedEnd);
                        const color = STAGE_COLORS[s.stage] || '#666';
                        const isCurrent = s.stage === order.currentStage;
                        return (
                          <div key={s.stage} className="gantt-bar"
                            style={{
                              left, width: Math.max(width - 2, 6), top: 6,
                              background: isCurrent ? color : color + '77',
                              border: s.hasShiftGap ? `1px dashed ${color}` : isCurrent ? `1px solid ${color}` : 'none',
                              color:'#fff', fontSize:'9px', zIndex: isCurrent ? 5 : 3,
                            }}>
                            {width > 40 ? s.stage.replace(' ',' ') : ''}
                          </div>
                        );
                      })}

                      {/* Shift window sub-bars — bottom track */}
                      {showShiftBars && (order.stages||[]).map(s =>
                        (s.shiftWindows||[]).map((w, wi) => {
                          const left = shiftPixelOffset(w.date, w.shiftId);
                          const width = dayWidth / 2 - 1;
                          if (w.isGap) {
                            return (
                              <div key={`gap-${s.stage}-${wi}`}
                                style={{
                                  position:'absolute', left, width: Math.max(width,4), top: 28, height: 16,
                                  background: 'repeating-linear-gradient(45deg,rgba(248,81,73,0.35),rgba(248,81,73,0.35) 3px,transparent 3px,transparent 6px)',
                                  border: '1px solid rgba(248,81,73,0.4)', borderRadius:'2px', zIndex:4,
                                  cursor:'default',
                                }}
                                title={`GAP: ${w.gapReason}`}>
                              </div>
                            );
                          }
                          return (
                            <div key={`shift-${s.stage}-${wi}`}
                              style={{
                                position:'absolute', left, width: Math.max(width,4), top: 28, height: 16,
                                background: w.shiftId === 'A' ? 'rgba(31,111,235,0.6)' : 'rgba(124,58,237,0.6)',
                                borderRadius:'2px', zIndex:4, cursor:'default',
                              }}
                              title={`${w.shiftLabel}: ${(w.hoursWorked||0).toFixed(0)}h — ${w.operatorName||''}`}>
                            </div>
                          );
                        })
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ORDER OVERRIDE MODAL
// ============================================================
function OrderOverrideModal({ order, existingOverride, onSave, onCancel }) {
  const orig = existingOverride
    ? { priority: existingOverride.origPriority, dueDate: existingOverride.origDueDate, complexity: existingOverride.origComplexity }
    : { priority: order.priority, dueDate: order.dueDate, complexity: order.complexity };

  const [priority, setPriority] = useState(existingOverride?.priority || order.priority);
  const [dueDate, setDueDate] = useState(existingOverride?.dueDate || order.dueDate);
  const [complexity, setComplexity] = useState(existingOverride?.complexity || order.complexity);
  const [reason, setReason] = useState(existingOverride?.reason || '');

  const changed = priority !== orig.priority || dueDate !== orig.dueDate || complexity !== orig.complexity;

  function handleSave() {
    if (!reason.trim()) { alert('Please enter a reason for this override.'); return; }
    onSave({
      poNum: order.poNum,
      priority,
      dueDate,
      complexity,
      reason,
      overriddenAt: new Date().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' }),
      overriddenBy: 'Planner (Manual)',
      origPriority: orig.priority,
      origDueDate: orig.dueDate,
      origComplexity: orig.complexity,
    });
  }

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onCancel()}>
      <div className="modal">
        <div className="modal-header">
          <div>
            <div className="modal-title" style={{color:'var(--accent-amber)'}}>✎ MANUAL OVERRIDE — {order.poNum}</div>
            <div style={{fontSize:'10px',color:'var(--text-muted)',marginTop:'2px',fontFamily:'var(--mono)'}}>{order.soNum} · {order.customer?.name} · {order.partType}</div>
          </div>
          <div className="drawer-close" onClick={onCancel}>✕</div>
        </div>

        <div className="modal-body">
          {existingOverride && (
            <div style={{background:'var(--accent-amber-dim)',border:'1px solid var(--accent-amber)44',borderRadius:'5px',padding:'8px 12px',marginBottom:'14px',fontSize:'11px',color:'var(--accent-amber)'}}>
              ⚠ Active override applied {existingOverride.overriddenAt} — editing will replace it.
            </div>
          )}

          <div className="form-row">
            <label className="form-label">
              Priority
              {priority !== orig.priority && <span className="form-label-orig">&nbsp;(was: {orig.priority})</span>}
            </label>
            <select
              className={`form-select ${priority !== orig.priority ? 'form-changed' : ''}`}
              value={priority}
              onChange={e => setPriority(e.target.value)}
            >
              {['Critical','High','Medium','Low'].map(p => <option key={p}>{p}</option>)}
            </select>
          </div>

          <div className="form-row">
            <label className="form-label">
              Due Date
              {dueDate !== orig.dueDate && <span className="form-label-orig">&nbsp;(was: {orig.dueDate})</span>}
            </label>
            <input
              type="date"
              className={`form-input ${dueDate !== orig.dueDate ? 'form-changed' : ''}`}
              value={dueDate}
              onChange={e => setDueDate(e.target.value)}
            />
          </div>

          <div className="form-row">
            <label className="form-label">
              Complexity
              {complexity !== orig.complexity && <span className="form-label-orig">&nbsp;(was: {orig.complexity})</span>}
            </label>
            <select
              className={`form-select ${complexity !== orig.complexity ? 'form-changed' : ''}`}
              value={complexity}
              onChange={e => setComplexity(e.target.value)}
            >
              {['Low','Medium','High','Very High'].map(c => <option key={c}>{c}</option>)}
            </select>
          </div>

          <div className="form-row" style={{marginBottom:0}}>
            <label className="form-label">Override Reason <span style={{color:'var(--accent-red)'}}>*</span></label>
            <textarea
              className="reason-textarea"
              placeholder="e.g. Customer escalation — expedite delivery. Approved by: Production Manager."
              value={reason}
              onChange={e => setReason(e.target.value)}
            />
          </div>
        </div>

        <div className="modal-footer">
          {existingOverride && (
            <button className="btn btn-secondary" onClick={() => onSave(null)} style={{marginRight:'auto',color:'var(--accent-red)',borderColor:'var(--accent-red)44'}}>
              Clear Override
            </button>
          )}
          <button className="btn btn-secondary" onClick={onCancel}>Cancel</button>
          <button
            className="btn btn-primary"
            onClick={handleSave}
            disabled={!changed}
            style={{background: changed ? 'var(--accent-amber)' : undefined, opacity: changed ? 1 : 0.4}}
          >
            {changed ? 'Save Override + Replan' : 'No Changes'}
          </button>
        </div>
      </div>
    </div>
  );
}
